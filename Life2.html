<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lifeline India | Gemini AI Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            touch-action: manipulation;
        }

        .animate-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .pulse-ring { animation: ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

        .radar-scan {
            width: 500px;
            height: 500px;
            background: conic-gradient(from 0deg, rgba(37, 99, 235, 0.15), transparent 90deg);
            border-radius: 50%;
            animation: scan 6s linear infinite;
        }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pt-safe { padding-top: max(1rem, var(--safe-top)); }
        .pb-safe { padding-bottom: max(1.5rem, var(--safe-bottom)); }

        .route-path {
            stroke-dasharray: 8;
            animation: dash 25s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: -1000; } }

        .feature-card { transition: all 0.2s ease; cursor: pointer; }
        .feature-card:active { transform: scale(0.96); opacity: 0.9; }

        /* FAB for AI */
        .fab-btn {
            position: fixed;
            bottom: calc(100px + var(--safe-bottom));
            right: 20px;
            z-index: 500;
        }

        .typing-dot { width: 4px; height: 4px; background: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        #app-container {
            width: 100%;
            height: 100dvh;
        }

        @media (min-width: 640px) {
            #app-container {
                max-width: 28rem;
            }
        }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen">

    <div id="app-container" class="bg-white shadow-2xl relative overflow-hidden flex flex-col">
        <!-- Application Engine -->
    </div>

    <script>
        const apiKey = ""; // Gemini API Key logic built-in

        // --- TRANSLATIONS ---
        const TRANSLATIONS = {
            en: {
                appName: "Lifeline India",
                gridTitle: "AI Emergency Grid",
                searchPlaceholder: "Enter symptoms or condition...",
                searchTitle: "AI Symptom Analysis",
                bloodUnits: "Blood Bank",
                realTimeStocks: "Check inventory",
                firstAid: "First Aid",
                emergencyGuides: "Safe protocols",
                ambulanceRadar: "Ambulance Radar",
                panicSOS: "SOS Call",
                call108: "Dial 108",
                matchedCenters: "Nearby Medical Centers",
                centersFound: "Hospitals",
                aiGreet: "I am Lifeline AI. Describe your emergency and I will route you to the best specialist instantly.",
                aiAnalyzeBtn: "✨ Analyze with AI",
                aiGenerating: "AI is analyzing...",
                doctorReport: "✨ Generate ER Report",
                reportSuccess: "ER Report generated for hospital check-in."
            },
            hi: {
                appName: "लाइफलाइन इंडिया",
                gridTitle: "AI आपातकालीन ग्रिड",
                searchPlaceholder: "लक्षण या स्थिति लिखें...",
                searchTitle: "AI लक्षण विश्लेषण",
                bloodUnits: "ब्लड बैंक",
                realTimeStocks: "स्टॉक देखें",
                firstAid: "प्राथमिक उपचार",
                emergencyGuides: "सुरक्षित प्रोटोकॉल",
                ambulanceRadar: "एम्बुलेंस रडार",
                panicSOS: "SOS कॉल",
                call108: "108 डायल करें",
                matchedCenters: "पास के चिकित्सा केंद्र",
                centersFound: "अस्पताल",
                aiGreet: "मैं लाइफलाइन AI हूँ। अपनी परेशानी बताएं और मैं आपको तुरंत सही विशेषज्ञ के पास भेज दूंगा।",
                aiAnalyzeBtn: "✨ AI से विश्लेषण करें",
                aiGenerating: "AI विश्लेषण कर रहा है...",
                doctorReport: "✨ ER रिपोर्ट बनाएं",
                reportSuccess: "अस्पताल चेक-इन के लिए ER रिपोर्ट तैयार है।"
            }
        };

        const FIRST_AID_GUIDES = {
            en: [
                { id: 'cpr', title: 'CPR (Adult)', steps: ['Scene safety check', 'Call 108', 'Chest compressions', 'Rescue breaths'], color: 'bg-red-500', icon: 'heart-pulse' },
                { id: 'choking', title: 'Choking', steps: ['Behind person', '5 back blows', '5 abdominal thrusts'], color: 'bg-orange-500', icon: 'wind' }
            ],
            hi: [
                { id: 'cpr', title: 'CPR (वयस्क)', steps: ['सुरक्षा जांचें', '108 कॉल करें', 'छाती दबाएं', 'सांस दें'], color: 'bg-red-500', icon: 'heart-pulse' },
                { id: 'choking', title: 'दम घुटना', steps: ['व्यक्ति के पीछे खड़े हों', '5 बार थपथपाएं', '5 बार दबाव दें'], color: 'bg-orange-500', icon: 'wind' }
            ]
        };

        let state = {
            loading: true,
            activeTab: 'home',
            lang: 'en',
            location: { lat: 28.6139, lng: 77.2090, name: "Locating device...", granted: false },
            hospitals: [],
            searchQuery: '',
            aiAnalysis: null,
            isAiModal: false,
            aiMessages: [], 
            isAiThinking: false,
            notification: null,
            selectedHospital: null
        };

        // --- GEMINI API INTEGRATION ---
        
        async function callGemini(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            const fetchWithRetry = async (retries = 5, delay = 1000) => {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API Error');
                    return await response.json();
                } catch (error) {
                    if (retries === 0) throw error;
                    await new Promise(r => setTimeout(r, delay));
                    return fetchWithRetry(retries - 1, delay * 2);
                }
            };

            try {
                const result = await fetchWithRetry();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (err) {
                console.error("Gemini Failure:", err);
                return null;
            }
        }

        async function analyzeSymptoms() {
            if (!state.searchQuery) return;
            setState({ isAiThinking: true, aiAnalysis: null });
            
            const prompt = `Analyze these symptoms: "${state.searchQuery}". 
            Context: Nearby hospitals are ${state.hospitals.slice(0,3).map(h => h.name).join(', ')}.
            Respond in ${state.lang === 'hi' ? 'Hindi' : 'English'}.
            Provide: 1. Severity Level 2. Suggested Specialist 3. Best nearby hospital 4. Immediate First Aid.
            Keep it under 100 words.`;

            const sys = "You are a professional medical triage agent for Lifeline India.";
            const response = await callGemini(prompt, sys);
            
            setState({ aiAnalysis: response, isAiThinking: false });
        }

        async function generateERReport(hospital) {
            showToast("✨ Generating medical summary...");
            const prompt = `Generate a concise 3-line medical summary for a doctor at ${hospital.name}. 
            Patient symptoms: ${state.searchQuery}. 
            Context: High priority. 
            Format as: Condition, Criticality, Suggested Vitals to check.`;

            const sys = "Act as a clinical documentation assistant.";
            const response = await callGemini(prompt, sys);
            
            if (response) {
                // In a real app, this would be a PDF or shared to hospital
                console.log("ER Report Generated:", response);
                showToast("✨ Report sent to ER desk");
            }
        }

        async function askAI(text) {
            if (!text.trim()) return;
            const currentHistory = [...state.aiMessages, { role: 'user', text }];
            setState({ aiMessages: currentHistory, isAiThinking: true });

            const sysPrompt = `You are Lifeline AI, a medical expert. 
            Nearby Hospitals: ${state.hospitals.slice(0,3).map(h=>h.name).join(', ')}.
            First Aid Guide: ${JSON.stringify(FIRST_AID_GUIDES[state.lang])}.
            Answer concisely and clearly. If urgent, tell them to call 108. Language: ${state.lang}.`;

            const response = await callGemini(text, sysPrompt);
            const aiText = response || "System busy. Dial 108 for help.";
            setState({ aiMessages: [...currentHistory, { role: 'model', text: aiText }], isAiThinking: false });
        }

        // --- CORE LOGIC ---

        function t() { return TRANSLATIONS[state.lang]; }

        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        function showToast(msg) {
            state.notification = msg; render();
            setTimeout(() => { state.notification = null; render(); }, 3000);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function initApp() {
            state.aiMessages = [{ role: 'model', text: t().aiGreet }];
            
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    try {
                        const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18`);
                        const geoData = await geoRes.json();
                        const addr = geoData.display_name ? geoData.display_name.split(',').slice(0, 3).join(', ') : "Real-time Location";

                        const osmQuery = `[out:json];node["amenity"="hospital"](around:15000,${latitude},${longitude});out body;`;
                        const hospitalRes = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(osmQuery)}`);
                        const hData = await hospitalRes.json();

                        const specs = ["Cardiology", "Neurology", "Orthopedic", "General Medicine", "Trauma Care"];

                        const processedHospitals = hData.elements.map(h => {
                            const dist = calculateDistance(latitude, longitude, h.lat, h.lon);
                            return {
                                id: h.id,
                                name: h.tags.name || "Medical Emergency Center",
                                lat: h.lat, lng: h.lon,
                                distance: dist,
                                beds: Math.floor(Math.random() * 30) + 1,
                                wait: Math.floor(Math.random() * 60) + 5,
                                cost: Math.floor(Math.random() * 600) + 200,
                                specialty: specs[Math.floor(Math.random() * specs.length)],
                                blood: { 'O+': 5, 'AB-': 2, 'B+': 10 },
                                medicines: { "Oxygen": 10, "Aspirin": 50 }
                            };
                        }).sort((a, b) => a.distance - b.distance);

                        setState({ 
                            location: { lat: latitude, lng: longitude, name: addr, granted: true },
                            hospitals: processedHospitals,
                            loading: false 
                        });
                    } catch (e) {
                        setState({ loading: false });
                    }
                }, () => setState({ loading: false }), { timeout: 8000 });
            } else {
                setState({ loading: false });
            }
        }

        // --- VIEWS ---

        function Header() {
            return `
                <div class="bg-white/95 backdrop-blur-xl p-4 pt-safe flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                            <i data-lucide="zap" class="text-white fill-white w-5 h-5"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h1 class="text-[9px] font-black text-blue-600 uppercase tracking-widest leading-none">${t().gridTitle}</h1>
                            <p class="text-xs font-black text-slate-900 truncate max-w-[140px] mt-0.5">${state.location.name}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setState({lang: state.lang === 'en' ? 'hi' : 'en'})" class="px-3 py-1.5 bg-slate-900 rounded-xl text-[10px] font-black text-white active:scale-95">
                            ${state.lang === 'en' ? 'हिन्दी' : 'EN'}
                        </button>
                    </div>
                </div>
            `;
        }

        function HomeView() {
            const query = state.searchQuery.toLowerCase();
            const filtered = state.hospitals.filter(h => 
                !query || h.name.toLowerCase().includes(query) || h.specialty.toLowerCase().includes(query)
            );

            return `
                <div class="p-4 space-y-6 pb-32 animate-in overflow-y-auto flex-1 hide-scrollbar">
                    
                    <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-50">
                        <h2 class="text-lg font-black text-slate-900 mb-4 tracking-tight">${t().searchTitle}</h2>
                        <div class="flex gap-2">
                            <div class="relative flex-1">
                                <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                                <input 
                                    type="text" 
                                    placeholder="${t().searchPlaceholder}" 
                                    class="w-full pl-14 pr-5 py-5 bg-slate-50 rounded-[2rem] font-bold text-sm focus:outline-none border-none placeholder-slate-300"
                                    value="${state.searchQuery}"
                                    oninput="setState({searchQuery: this.value})"
                                />
                            </div>
                            <button onclick="analyzeSymptoms()" class="px-5 bg-blue-600 text-white rounded-[1.5rem] font-black text-[10px] uppercase shadow-lg active:scale-95 transition-all">
                                ${t().aiAnalyzeBtn}
                            </button>
                        </div>
                    </div>

                    ${state.aiAnalysis ? `
                        <div class="bg-blue-50 p-6 rounded-[2.5rem] border border-blue-100 shadow-sm animate-in relative overflow-hidden">
                            <div class="absolute right-4 top-4 text-blue-200"><i data-lucide="sparkles" class="w-8 h-8"></i></div>
                            <h4 class="text-xs font-black text-blue-600 uppercase mb-2 tracking-widest">✨ Gemini Analysis</h4>
                            <p class="text-sm font-medium text-slate-700 leading-relaxed">${state.aiAnalysis}</p>
                            <button onclick="setState({aiAnalysis: null})" class="mt-4 text-[10px] font-black text-slate-400 uppercase">Clear Analysis</button>
                        </div>
                    ` : ''}

                    ${state.isAiThinking ? `
                        <div class="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 flex items-center justify-center gap-3">
                            <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${t().aiGenerating}</span>
                        </div>
                    ` : ''}

                    <div class="space-y-4">
                        <div class="flex justify-between items-center px-1">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${t().matchedCenters}</h3>
                        </div>

                        ${filtered.map(h => `
                            <div onclick="setState({selectedHospital: ${JSON.stringify(h).replace(/"/g, '&quot;')}, activeTab: 'map'})" class="bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col gap-4 active:scale-95 transition-all">
                                <div class="flex justify-between items-start">
                                    <div class="flex items-center gap-3">
                                        <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center">
                                            <i data-lucide="hospital" class="w-6 h-6"></i>
                                        </div>
                                        <div class="max-w-[140px]">
                                            <h4 class="font-black text-slate-900 text-sm tracking-tight truncate">${h.name}</h4>
                                            <p class="text-[9px] font-bold text-blue-500 uppercase">${h.distance.toFixed(2)} km • ${h.specialty}</p>
                                        </div>
                                    </div>
                                    <div class="flex flex-col items-end gap-2">
                                        <a href="tel:108" onclick="event.stopPropagation()" class="p-2.5 bg-red-50 text-red-600 rounded-xl border border-red-100 active:scale-90">
                                            <i data-lucide="phone" class="w-4 h-4"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function MapView() {
            const center = { x: 50, y: 50 };
            let route = '';
            if (state.selectedHospital) {
                const zoom = 5000;
                const hx = 50 + (state.selectedHospital.lng - state.location.lng) * zoom;
                const hy = 50 + (state.location.lat - state.selectedHospital.lat) * zoom;
                route = `<path d="M ${center.x} ${center.y} L ${hx} ${hy}" fill="none" stroke="#2563eb" stroke-width="1.2" class="route-path" stroke-linecap="round" />`;
            }

            return `
                <div class="flex-1 bg-slate-100 relative overflow-hidden flex flex-col animate-in">
                    <div class="flex-1 relative bg-[#f8fafc] overflow-hidden">
                        <svg class="absolute inset-0 w-full h-full opacity-40" viewBox="0 0 100 100">${route}</svg>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
                             <div class="radar-scan"></div>
                        </div>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30">
                             <div class="w-6 h-6 bg-blue-600 rounded-full border-4 border-white shadow-2xl relative">
                                <div class="absolute inset-0 bg-blue-600 rounded-full pulse-ring"></div>
                             </div>
                        </div>
                        ${state.hospitals.slice(0, 10).map(h => {
                            const zoom = 5000;
                            const hx = 50 + (h.lng - state.location.lng) * zoom;
                            const hy = 50 + (state.location.lat - h.lat) * zoom;
                            if (hx < -10 || hx > 110 || hy < -10 || hy > 110) return '';
                            return `<div onclick="setState({selectedHospital: ${JSON.stringify(h).replace(/"/g, '&quot;')}})" class="absolute transition-all duration-300 transform -translate-x-1/2 -translate-y-1/2 ${state.selectedHospital?.id === h.id ? 'scale-125 z-40' : 'z-20'}" style="top: ${hy}%; left: ${hx}%"><div class="p-2.5 rounded-2xl shadow-xl ring-4 ring-white ${h.beds > 0 ? 'bg-red-600' : 'bg-slate-400'} text-white"><i data-lucide="hospital" class="w-4 h-4"></i></div></div>`;
                        }).join('')}
                    </div>
                    ${state.selectedHospital ? `
                        <div class="absolute bottom-28 left-4 right-4 bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-8 slide-up z-50">
                            <div class="w-12 h-1 bg-slate-100 rounded-full mx-auto mb-6"></div>
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <h3 class="text-xl font-black text-slate-900 leading-tight truncate max-w-[200px]">${state.selectedHospital.name}</h3>
                                    <p class="text-xs text-slate-400 font-bold mt-1">Distance: ${state.selectedHospital.distance.toFixed(2)} km</p>
                                </div>
                                <button onclick="setState({selectedHospital: null})" class="p-2.5 bg-slate-50 rounded-2xl text-slate-400 active:scale-90"><i data-lucide="x" class="w-5 h-5"></i></button>
                            </div>
                            <div class="flex gap-3 mb-4">
                                <button onclick="generateERReport(${JSON.stringify(state.selectedHospital).replace(/"/g, '&quot;')})" class="flex-1 py-4 bg-slate-900 text-white rounded-[1.2rem] font-black text-[10px] uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                                    ${t().doctorReport}
                                </button>
                            </div>
                            <button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${state.selectedHospital.lat},${state.selectedHospital.lng}')" class="w-full py-5 bg-blue-600 text-white rounded-[1.2rem] font-black text-sm uppercase tracking-widest shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                                Open Google Maps <i data-lucide="arrow-up-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function AiAgentModal() {
            if (!state.isAiModal) return '';
            return `
                <div class="fixed inset-0 z-[1000] flex items-end justify-center bg-slate-900/40 backdrop-blur-sm px-4 pb-10 animate-in" onclick="setState({isAiModal: false})">
                    <div class="bg-white w-full max-w-md h-[85vh] rounded-[2.5rem] flex flex-col shadow-2xl overflow-hidden slide-up" onclick="event.stopPropagation()">
                        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="bot" class="text-white w-5 h-5"></i></div>
                                <div><h2 class="text-lg font-black text-slate-900 leading-none">${t().aiTitle}</h2><p class="text-[10px] font-bold text-green-500 uppercase mt-1">${t().aiSub}</p></div>
                            </div>
                            <button onclick="setState({isAiModal: false})" class="p-2 bg-slate-50 rounded-xl text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <div id="ai-chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 hide-scrollbar">
                            ${state.aiMessages.map(m => `<div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}"><div class="max-w-[85%] p-4 rounded-3xl ${m.role === 'user' ? 'bg-blue-600 text-white rounded-br-none shadow-lg' : 'bg-white text-slate-700 border border-slate-100 rounded-bl-none shadow-sm'}"><p class="text-sm font-medium leading-relaxed">${m.text}</p></div></div>`).join('')}
                            ${state.isAiThinking ? `<div class="flex justify-start"><div class="bg-white p-4 rounded-3xl flex gap-1 items-center shadow-sm"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>` : ''}
                        </div>
                        <div class="p-6 bg-white border-t border-slate-100 pb-safe">
                            <form onsubmit="event.preventDefault(); const inp = this.querySelector('input'); askAI(inp.value); inp.value='';" class="relative">
                                <input type="text" placeholder="${t().aiPlaceholder}" class="w-full pl-6 pr-14 py-5 rounded-[2rem] bg-slate-100 text-sm font-bold border-none outline-none focus:ring-2 focus:ring-blue-500/20" />
                                <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all"><i data-lucide="send" class="w-4 h-4"></i></button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
        }

        function BottomNav() {
            const tabs = [{ id: 'home', icon: 'home' }, { id: 'map', icon: 'map' }, { id: 'triage', icon: 'zap', central: true }, { id: 'blood', icon: 'droplet' }, { id: 'firstaid', icon: 'info' }];
            return `
                <nav class="fixed bottom-0 max-w-md w-full bg-white/95 backdrop-blur-2xl border-t border-slate-100 flex justify-around items-center p-4 pb-safe z-[200]">
                    ${tabs.map(tab => {
                        const isActive = state.activeTab === tab.id;
                        return `<button onclick="setState({activeTab: '${tab.id}'})" class="p-3 transition-all flex flex-col items-center gap-1 ${isActive ? 'text-blue-600 scale-110' : 'text-slate-300 active:scale-90'}"><i data-lucide="${tab.icon}" class="w-6 h-6 ${isActive ? 'fill-current' : ''}"></i></button>`;
                    }).join('')}
                </nav>
            `;
        }

        function render() {
            const container = document.getElementById('app-container');
            if (state.loading) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center bg-slate-950 absolute inset-0 z-[1000]"><div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] flex items-center justify-center shadow-2xl mb-10 animate-bounce"><i data-lucide="zap" class="text-white w-12 h-12 fill-current"></i></div><span class="text-[11px] font-black tracking-[0.6em] text-white uppercase animate-pulse">LIFELINE INDIA</span><p class="text-[8px] font-bold text-blue-500 uppercase mt-2">Connecting Real-Time Medical Grid...</p></div>`;
                lucide.createIcons(); return;
            }

            let content = '';
            switch(state.activeTab) {
                case 'home': content = HomeView(); break;
                case 'map': content = MapView(); break;
                case 'blood': content = `<div class="p-10 text-center opacity-30 mt-20 font-black tracking-widest text-xs uppercase">Blood Inventory Connected</div>`; break;
                case 'firstaid': content = `<div class="p-10 text-center opacity-30 mt-20 font-black tracking-widest text-xs uppercase">Life-Saving Guides Connected</div>`; break;
            }

            container.innerHTML = `
                ${Header()}
                <main class="flex-1 flex flex-col overflow-hidden relative bg-[#f8fafc]">${content}</main>
                ${BottomNav()}
                <button onclick="setState({isAiModal: true})" class="fab-btn w-16 h-16 bg-slate-900 text-white rounded-[2rem] flex items-center justify-center shadow-2xl active:scale-90 transition-transform ring-4 ring-white/5">
                    <i data-lucide="bot" class="w-8 h-8"></i>
                </button>
                ${AiAgentModal()}
                ${state.notification ? `<div class="fixed top-24 left-4 right-4 z-[300] animate-in bg-slate-900 text-white p-4 rounded-2xl font-black text-[10px] text-center uppercase tracking-widest shadow-2xl">${state.notification}</div>` : ''}
            `;
            lucide.createIcons();
            const cb = document.getElementById('ai-chat-box'); if(cb) cb.scrollTop = cb.scrollHeight;
        }

        window.addEventListener('load', () => {
            initApp();
            setTimeout(() => { if (state.loading) setState({ loading: false }); }, 10000);
        });
    </script>
</body>
</html>
