<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lifeline India - Real-World Health Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            touch-action: manipulation;
        }

        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .pulse-ring { animation: ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

        .radar-scan {
            width: 450px;
            height: 450px;
            background: conic-gradient(from 0deg, rgba(37, 99, 235, 0.1), transparent 90deg);
            border-radius: 50%;
            animation: scan 5s linear infinite;
        }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pt-safe { padding-top: max(1rem, var(--safe-top)); }
        .pb-safe { padding-bottom: max(1.5rem, var(--safe-bottom)); }

        .feature-card { transition: all 0.2s ease; cursor: pointer; }
        .feature-card:active { transform: scale(0.96); opacity: 0.9; }

        /* Fixed AI FAB */
        .fab-btn {
            position: fixed;
            bottom: calc(100px + var(--safe-bottom));
            right: 20px;
            z-index: 500;
        }

        .typing-dot { width: 4px; height: 4px; background: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen">

    <div id="app-container" class="max-w-md w-full bg-white h-[100dvh] shadow-2xl relative overflow-hidden flex flex-col">
        <!-- Main Logic Injected by JS -->
    </div>

    <script>
        const apiKey = ""; // Provided by environment

        // --- GLOBAL STATE ---
        let state = {
            loading: true,
            activeTab: 'home',
            location: { lat: null, lng: null, name: "Locating you...", granted: false },
            hospitals: [], // Real hospitals fetched from API
            searchQuery: '',
            medQuery: '',
            isAiModal: false,
            aiMessages: [{ role: 'ai', text: 'Namaste! Main Lifeline AI hoon. Main aapke area ke real hospitals aur specialists dhoondne mein madad kar sakta hoon. Aapko kya takleef hai?' }],
            isAiThinking: false,
            notification: null,
            selectedHospital: null
        };

        const FIRST_AID_GUIDES = [
            { id: 'cpr', title: 'CPR Steps', steps: ['Safe environment check', 'Call 108', 'Chest compressions hard/fast', 'Rescue breaths', 'Continue until help arrives'], color: 'bg-red-500', icon: 'heart-pulse' },
            { id: 'choking', title: 'Choking', steps: ['Encourage coughing', '5 back blows', '5 abdominal thrusts', 'Repeat cycles'], color: 'bg-orange-500', icon: 'wind' }
        ];

        // --- CORE FUNCTIONS ---
        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        function showToast(msg) {
            state.notification = msg; render();
            setTimeout(() => { state.notification = null; render(); }, 3000);
        }

        // Distance calc helper
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function initGeoSystem() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    
                    try {
                        // 1. Fetch Real Address (Reverse Geocode)
                        const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18`);
                        const geoData = await geoRes.json();
                        const addressLabel = geoData.display_name.split(',').slice(0, 3).join(',');

                        // 2. Fetch REAL Hospitals from Overpass API
                        const osmQuery = `[out:json];node["amenity"="hospital"](around:10000,${latitude},${longitude});out body;`;
                        const hospitalRes = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(osmQuery)}`);
                        const hData = await hospitalRes.json();

                        const realHospitals = hData.elements.map(h => {
                            const dist = getDistance(latitude, longitude, h.lat, h.lon);
                            return {
                                id: h.id,
                                name: h.tags.name || "Sarkari/Private Hospital",
                                lat: h.lat,
                                lng: h.lon,
                                distance: dist,
                                // Dummy Data for non-public live stats
                                beds: Math.floor(Math.random() * 25) + 2,
                                wait: Math.floor(Math.random() * 40) + 5,
                                cost: Math.floor(Math.random() * 600) + 250,
                                specialty: dist < 3 ? "Multi-Specialty" : "General Ward",
                                doctors: ["Dr. Khanna (Active)", "Dr. Reddy (On Call)"],
                                medicines: { "Oxygen": 20, "Aspirin": 100, "Paracetamol": 500 }
                            };
                        }).sort((a, b) => a.distance - b.distance);

                        setState({ 
                            location: { lat: latitude, lng: longitude, name: addressLabel, granted: true },
                            hospitals: realHospitals,
                            loading: false 
                        });
                    } catch (e) {
                        setState({ loading: false, notification: "Asli data lane mein dikkat hui. Refresh karein." });
                    }
                }, () => {
                    setState({ loading: false, notification: "Location access zaruri hai." });
                });
            }
        }

        async function askAI(text) {
            if (!text.trim()) return;
            const msgs = [...state.aiMessages, { role: 'user', text }];
            setState({ aiMessages: msgs, isAiThinking: true });

            const systemPrompt = `You are Lifeline AI. User location: ${state.location.name}. 
            Nearby Real Hospitals: ${state.hospitals.slice(0, 5).map(h => h.name).join(', ')}.
            Instructions: Sabse pehle nazdeeki hospital recommend karein. Serious case mein 108 call karne ko bolein. Hindi-English mix use karein.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text }] }], systemInstruction: { parts: [{ text: systemPrompt }] } })
                });
                const data = await response.json();
                const resText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf kijiye, main connect nahi kar paa raha.";
                setState({ aiMessages: [...msgs, { role: 'ai', text: resText }], isAiThinking: false });
            } catch (e) {
                setState({ aiMessages: [...msgs, { role: 'ai', text: "Network error. Phir se koshish karein." }], isAiThinking: false });
            }
        }

        // --- VIEWS ---

        function Header() {
            return `
                <div class="bg-white/95 backdrop-blur-xl p-4 pt-safe flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                            <i data-lucide="map-pin" class="text-white w-5 h-5"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h1 class="text-[9px] font-black text-blue-600 uppercase tracking-widest leading-none">Aapka Real Location</h1>
                            <p class="text-xs font-black text-slate-900 truncate max-w-[220px] mt-0.5">${state.location.name}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function HomeView() {
            const filtered = state.hospitals.filter(h => 
                !state.searchQuery || h.name.toLowerCase().includes(state.searchQuery.toLowerCase()) ||
                h.specialty.toLowerCase().includes(state.searchQuery.toLowerCase())
            );

            return `
                <div class="p-5 space-y-6 pb-32 animate-in overflow-y-auto flex-1 hide-scrollbar">
                    
                    <!-- Real Search Box -->
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-50">
                        <h2 class="text-xl font-black text-slate-900 mb-4 tracking-tight">Disease ya Doctor Search Karein</h2>
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                            <input 
                                type="text" 
                                placeholder="Fever, Heart, Surgery..." 
                                class="w-full pl-14 pr-5 py-5 bg-slate-50 rounded-[2rem] font-bold text-sm focus:outline-none border-none placeholder-slate-300"
                                oninput="setState({searchQuery: this.value})"
                            />
                        </div>
                    </div>

                    <!-- 4-Grid Features -->
                    <div class="grid grid-cols-2 gap-4">
                        <div onclick="setState({activeTab: 'blood'})" class="feature-card p-5 bg-orange-50 border border-orange-100 rounded-[2.5rem]">
                            <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white mb-4 shadow-lg shadow-orange-500/20">
                                <i data-lucide="droplet" class="w-5 h-5"></i>
                            </div>
                            <h3 class="font-black text-slate-800 text-sm mb-1">Blood Units</h3>
                            <p class="text-[10px] text-slate-400 font-medium">Real-time stocks</p>
                        </div>
                        <div onclick="setState({activeTab: 'firstaid'})" class="feature-card p-5 bg-teal-50 border border-teal-100 rounded-[2.5rem]">
                            <div class="w-10 h-10 bg-teal-500 rounded-full flex items-center justify-center text-white mb-4 shadow-lg shadow-teal-500/20">
                                <i data-lucide="info" class="w-5 h-5"></i>
                            </div>
                            <h3 class="font-black text-slate-800 text-sm mb-1">First Aid</h3>
                            <p class="text-[10px] text-slate-400 font-medium">Emergency guides</p>
                        </div>
                    </div>

                    <!-- Sorted Hospital List (Real Data) -->
                    <div class="space-y-4">
                        <div class="flex justify-between items-center px-1">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sabse Nazdeeki Hospitals (${filtered.length})</h3>
                        </div>
                        
                        ${filtered.length > 0 ? filtered.map(h => `
                            <div onclick="setState({selectedHospital: ${JSON.stringify(h).replace(/"/g, '&quot;')}, activeTab: 'map'})" class="bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col gap-4 active:scale-95 transition-all">
                                <div class="flex justify-between items-start">
                                    <div class="flex items-center gap-3">
                                        <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center">
                                            <i data-lucide="hospital" class="w-6 h-6"></i>
                                        </div>
                                        <div>
                                            <h4 class="font-black text-slate-900 text-sm leading-tight">${h.name}</h4>
                                            <p class="text-[10px] font-bold text-blue-600 uppercase mt-0.5">${h.distance.toFixed(2)} km • ${h.specialty}</p>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-xs font-black text-green-600">₹${h.cost}</p>
                                        <p class="text-[8px] font-bold text-slate-400 uppercase">Fees</p>
                                    </div>
                                </div>
                                <div class="flex gap-2 pt-2 border-t border-slate-50">
                                    <span class="text-[8px] font-black text-slate-500 bg-slate-100 px-2 py-1 rounded-lg uppercase">${h.beds} Beds</span>
                                    <span class="text-[8px] font-black text-orange-500 bg-orange-50 px-2 py-1 rounded-lg uppercase">${h.wait}m Wait</span>
                                    <span class="text-[8px] font-black text-teal-600 bg-teal-50 px-2 py-1 rounded-lg uppercase">${h.doctors[0]}</span>
                                </div>
                            </div>
                        `).join('') : `
                            <div class="py-12 text-center opacity-30">
                                <p class="text-xs font-black uppercase">Koi hospital nahi mila</p>
                            </div>
                        `}
                    </div>

                    <!-- SOS Call -->
                    <div class="bg-red-600 p-6 rounded-[2.5rem] text-white flex justify-between items-center shadow-xl shadow-red-200">
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Aapatkaleen SOS</p>
                            <h3 class="text-2xl font-black italic uppercase leading-none">Call 108</h3>
                        </div>
                        <a href="tel:108" class="w-16 h-16 bg-white rounded-[1.8rem] flex items-center justify-center text-red-600 shadow-xl active:scale-90 transition-transform">
                            <i data-lucide="phone" class="w-8 h-8 fill-current"></i>
                        </a>
                    </div>
                </div>
            `;
        }

        function MapView() {
            return `
                <div class="flex-1 bg-slate-100 relative overflow-hidden flex flex-col animate-in">
                    <div class="flex-1 relative bg-[#f1f5f9] overflow-hidden">
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
                             <div class="radar-scan"></div>
                        </div>
                        
                        <!-- User Position -->
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30">
                             <div class="w-6 h-6 bg-blue-600 rounded-full border-4 border-white shadow-2xl relative">
                                <div class="absolute inset-0 bg-blue-600 rounded-full pulse-ring"></div>
                             </div>
                        </div>

                        ${state.hospitals.slice(0, 10).map(h => `
                            <div onclick="setState({selectedHospital: ${JSON.stringify(h).replace(/"/g, '&quot;')}})" 
                                 class="absolute transition-all duration-300 transform -translate-x-1/2 -translate-y-1/2 ${state.selectedHospital?.id === h.id ? 'scale-125 z-40' : 'z-20'}" 
                                 style="top: ${50 + (h.lat - state.location.lat)*8000}%; left: ${50 + (h.lng - state.location.lng)*8000}%">
                                <div class="p-2.5 rounded-2xl shadow-xl ring-4 ring-white ${h.beds > 0 ? 'bg-red-600' : 'bg-slate-400'} text-white">
                                    <i data-lucide="hospital" class="w-4 h-4"></i>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    ${state.selectedHospital ? `
                        <div class="absolute bottom-28 left-4 right-4 bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 p-8 slide-up z-50">
                            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-6"></div>
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-lg uppercase">Hospital Detail</span>
                                    <h3 class="text-xl font-black text-slate-900 leading-tight mt-1">${state.selectedHospital.name}</h3>
                                    <p class="text-xs text-slate-400 font-bold mt-1">${state.selectedHospital.distance.toFixed(2)} km dur</p>
                                </div>
                                <button onclick="setState({selectedHospital: null})" class="p-2.5 bg-slate-50 rounded-2xl text-slate-400 active:scale-90"><i data-lucide="x" class="w-5 h-5"></i></button>
                            </div>
                            <button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${state.selectedHospital.lat},${state.selectedHospital.lng}')" class="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black text-sm uppercase tracking-widest shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                                Google Maps Open Karein <i data-lucide="navigation" class="w-5 h-5"><
