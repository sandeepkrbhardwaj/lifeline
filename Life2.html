<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lifeline India | Medical Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            touch-action: manipulation;
        }

        .animate-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .pulse-ring { animation: ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

        .radar-scan {
            width: 500px;
            height: 500px;
            background: conic-gradient(from 0deg, rgba(37, 99, 235, 0.15), transparent 90deg);
            border-radius: 50%;
            animation: scan 6s linear infinite;
        }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pt-safe { padding-top: max(1rem, var(--safe-top)); }
        .pb-safe { padding-bottom: max(1.5rem, var(--safe-bottom)); }

        .feature-card { transition: all 0.2s ease; cursor: pointer; }
        .feature-card:active { transform: scale(0.96); opacity: 0.9; }

        .fab-btn {
            position: fixed;
            bottom: calc(100px + var(--safe-bottom));
            right: 20px;
            z-index: 500;
        }

        .typing-dot { width: 4px; height: 4px; background: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        #app-container {
            width: 100%;
            height: 100dvh;
            background: #f8fafc;
        }

        @media (min-width: 640px) {
            #app-container { max-width: 28rem; margin: 0 auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        }

        .live-badge::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #ef4444;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        
        /* Remove arrows from number inputs in admin panel */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

        const FIRST_AID_GUIDES = {
            en: [
                { id: 'cpr', title: 'CPR (Adult)', steps: ['Check scene safety', 'Call 108/Emergency', 'Push hard & fast in center of chest', 'Allow full chest recoil', 'Give rescue breaths'], color: 'bg-red-500', icon: 'heart-pulse' },
                { id: 'choking', title: 'Choking / Heimlich', steps: ['Stand behind the person', 'Give 5 back blows', 'Give 5 abdominal thrusts', 'Repeat until object is out'], color: 'bg-orange-500', icon: 'wind' }
            ],

                { id: 'cpr', title: 'CPR (वयस्क)', steps: ['जगह की सुरक्षा जांचें', '108 कॉल करें', 'छाती के बीच में जोर से दबाएं', 'छाती को वापस आने दें', 'सांस दें'], color: 'bg-red-500', icon: 'heart-pulse' },
                { id: 'choking', title: 'दम घुटना (Heimlich)', steps: ['व्यक्ति के पीछे खड़े हों', 'पीठ पर 5 बार थपथपाएं', 'पेट पर 5 बार दबाव दें', 'वस्तु बाहर आने तक दोहराएं'], color: 'bg-orange-500', icon: 'wind' }
            ]
        };

        // --- APP STATE ---
        let state = {
            loading: true,
            view: 'user', // 'user', 'login', 'admin'
            activeTab: 'home', // 'home', 'map', 'blood', 'firstaid'
            lang: 'en',
            location: { lat: 28.6139, lng: 77.2090, name: "Locating...", granted: false },
            hospitals: [],
            searchQuery: '',
            isAiModal: false,
            aiMessages: [],
            isAiThinking: false,
            notification: null,
            viewingHospitalDetail: null,
            adminHospitalId: null // Stores the ID of the hospital currently being edited
        };

        function t() { return TRANSLATIONS[state.lang]; }

        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        function showToast(msg) {
            state.notification = msg; render();
            setTimeout(() => { state.notification = null; render(); }, 3000);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // --- INITIALIZATION & API ---
        async function initApp() {
            state.aiMessages = [{ role: 'ai', text: TRANSLATIONS.en.aiGreet }];
            
            const fallbackTimer = setTimeout(() => {
                if (state.loading) setState({ loading: false, location: { ...state.location, name: "Default (New Delhi)" } });
            }, 8000);

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    try {
                        // 1. Get readable address
                        const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18`);
                        const geoData = await geoRes.json();
                        const addr = geoData.display_name ? geoData.display_name.split(',').slice(0, 3).join(', ') : "Current Location";

                        // 2. Get real hospitals from OSM
                        const osmQuery = `[out:json];node["amenity"="hospital"](around:15000,${latitude},${longitude});out body;`;
                        const hospitalRes = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(osmQuery)}`);
                        const hData = await hospitalRes.json();

                        const specs = ["Cardiology", "Neurology", "Orthopedic", "General Medicine", "Pediatrics", "Trauma Care"];

                        // 3. Process and mock live data
                        const processedHospitals = hData.elements.map(h => {
                            const dist = calculateDistance(latitude, longitude, h.lat, h.lon);
                            return {
                                id: h.id.toString(),
                                name: h.tags.name || "Emergency Medical Center",
                                lat: h.lat, lng: h.lon,
                                distance: dist,
                                beds: Math.floor(Math.random() * 40) + 10,
                                icuBeds: Math.floor(Math.random() * 12) + 2,
                                ventilators: Math.floor(Math.random() * 8) + 1,
                                doctors: Math.floor(Math.random() * 25) + 5,
                                paramedics: Math.floor(Math.random() * 15) + 3,
                                wait: Math.floor(Math.random() * 50) + 5,
                                cost: Math.floor(Math.random() * 500) + 300,
                                specialty: specs[Math.floor(Math.random() * specs.length)],
                                blood: { 'O+': Math.floor(Math.random()*15), 'AB-': Math.floor(Math.random()*3), 'B+': Math.floor(Math.random()*20) },
                                medicines: { "Oxygen Cylinders": Math.floor(Math.random()*25), "Aspirin": 120, "Insulin": 20 }
                            };
                        }).sort((a, b) => a.distance - b.distance);

                        clearTimeout(fallbackTimer);
                        setState({ 
                            location: { lat: latitude, lng: longitude, name: addr, granted: true },
                            hospitals: processedHospitals,
                            loading: false 
                        });
                    } catch (e) {
                        clearTimeout(fallbackTimer);
                        setState({ loading: false, location: { ...state.location, name: "Network Error - Offline Mode" } });
                    }
                }, () => {
                    clearTimeout(fallbackTimer);
                    setState({ loading: false, location: { ...state.location, name: "Location Denied" } });
                }, { timeout: 8000 });
            } else {
                clearTimeout(fallbackTimer);
                setState({ loading: false });
            }
        }

        async function askAI(text) {
            if (!text.trim() || !apiKey) return;
            const msgs = [...state.aiMessages, { role: 'user', text }];
            setState({ aiMessages: msgs, isAiThinking: true });

            const topHospitals = state.hospitals.slice(0, 3).map(h => `${h.name} (${h.beds} beds available)`).join(', ');
            const sysPrompt = `You are Lifeline AI. Location: ${state.location.name}. Top hospitals near user: ${topHospitals}. Language: ${state.lang === 'hi' ? 'Hindi' : 'English'}. Be extremely fast, concise, and helpful.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text }] }], systemInstruction: { parts: [{ text: sysPrompt }] } })
                });
                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Call 108 immediately for severe emergencies.";
                setState({ aiMessages: [...msgs, { role: 'ai', text: aiText }], isAiThinking: false });
            } catch (e) {
                setState({ aiMessages: [...msgs, { role: 'ai', text: "Connection error. Please try calling 108 directly." }], isAiThinking: false });
            }
        }

        function handleNavigation(hId) {
            const h = state.hospitals.find(x => x.id === hId);
            if (!h) return;
            const url = `https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lng}&travelmode=driving`;
            window.open(url, '_blank');
        }

        // --- ADMIN UPDATE LOGIC ---
        // Updates the object without triggering a full re-render immediately (preserves input focus)
        function updateHospitalStat(hId, key, value) {
            const hospital = state.hospitals.find(h => h.id === hId);
            if (hospital) hospital[key] = parseInt(value) || 0;
        }

        function updateHospitalBlood(hId, bloodType, value) {
            const hospital = state.hospitals.find(h => h.id === hId);
            if (hospital && hospital.blood) hospital.blood[bloodType] = parseInt(value) || 0;
        }

        function handleAdminPublish() {
            showToast("Records Updated Securely");
            setState({ view: 'user', adminHospitalId: null });
        }

                                            <h4 class="font-black text-slate-900 text-sm tracking-tight truncate">${h.name}</h4>

            `;
        }

        function HospitalDetailPopup() {
            if (!state.viewingHospitalDetail) return '';
            const h = state.hospitals.find(x => x.id === state.viewingHospitalDetail);
            if (!h) return '';

            return `
                <div class="fixed inset-0 z-[1001] bg-slate-900/60 backdrop-blur-md flex items-end sm:items-center justify-center animate-in overflow-y-auto" onclick="setState({viewingHospitalDetail: null})">
                    <div class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] shadow-2xl slide-up overflow-hidden" onclick="event.stopPropagation()">
                        <div class="p-6 bg-blue-600 text-white relative">

                            </button>
                            <div class="flex items-center gap-2 mb-2">

                        </div>

                        <div class="p-6 space-y-6">
                            <div class="grid grid-cols-3 gap-3">
                                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex flex-col items-center">
                                    <span class="text-2xl font-black text-blue-600">${h.beds}</span>
                                    <span class="text-[8px] font-black uppercase text-slate-400 mt-1">${t().beds}</span>
                                </div>
                                <div class="p-4 bg-red-50 rounded-2xl border border-red-100 flex flex-col items-center">
                                    <span class="text-2xl font-black text-red-600">${h.icuBeds}</span>
                                    <span class="text-[8px] font-black uppercase text-slate-400 mt-1">${t().icuBeds}</span>
                                </div>
                                <div class="p-4 bg-teal-50 rounded-2xl border border-teal-100 flex flex-col items-center">
                                    <span class="text-2xl font-black text-teal-600">${h.ventilators}</span>
                                    <span class="text-[8px] font-black uppercase text-slate-400 mt-1">${t().ventilators}</span>
                                </div>
                            </div>

                            <div class="flex gap-4 p-4 bg-slate-900 rounded-[1.5rem] text-white">
                                <div class="flex-1 flex flex-col border-r border-white/10">
                                    <span class="text-xs font-bold opacity-60 uppercase tracking-tighter">${t().doctors}</span>
                                    <span class="text-lg font-black">${h.doctors} Available</span>
                                </div>
                                <div class="flex-1 flex flex-col">
                                    <span class="text-xs font-bold opacity-60 uppercase tracking-tighter">${t().staff}</span>
                                    <span class="text-lg font-black">${h.paramedics} Ready</span>
                                </div>
                            </div>

                            <div class="space-y-4">
                                <div>
                                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">${t().bloodBank}</h4>
                                    <div class="grid grid-cols-3 gap-2">
                                        ${Object.entries(h.blood).map(([type, qty]) => `
                                            <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                <span class="text-xs font-black text-slate-800">${type}</span>
                                                <span class="text-[11px] font-bold ${qty > 0 ? 'text-green-600' : 'text-red-500'}">${qty}u</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>

                            <div class="flex gap-3 pt-4 pb-safe">
                                <a href="tel:108" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-black text-center text-sm uppercase shadow-xl shadow-red-500/20 active:scale-95 transition-transform flex items-center justify-center gap-2">
                                    <i data-lucide="phone" class="w-4 h-4"></i> Call 108
                                </a>
                                <button onclick="handleNavigation('${h.id}')" class="flex-[1.5] py-4 bg-blue-600 text-white rounded-2xl font-black text-sm uppercase shadow-xl shadow-blue-500/20 active:scale-95 transition-transform flex items-center justify-center gap-2">
                                    <i data-lucide="navigation" class="w-4 h-4"></i> ${t().openMaps}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function MapView() {
            return `
                <div class="flex-1 bg-slate-100 relative overflow-hidden flex flex-col animate-in">
                    <div class="flex-1 relative bg-[#f8fafc] overflow-hidden">
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"><div class="radar-scan"></div></div>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30">
                             <div class="w-6 h-6 bg-blue-600 rounded-full border-4 border-white shadow-2xl relative">
                                <div class="absolute inset-0 bg-blue-600 rounded-full pulse-ring"></div>
                             </div>
                        </div>
                        ${state.hospitals.slice(0, 15).map(h => {
                            const hx = 50 + (h.lng - state.location.lng) * 5000;
                            const hy = 50 + (state.location.lat - h.lat) * 5000;
                            if (hx < -10 || hx > 110 || hy < -10 || hy > 110) return '';
                            return `
                                <div onclick="setState({viewingHospitalDetail: '${h.id}'})" 
                                     class="absolute transition-all duration-300 transform -translate-x-1/2 -translate-y-1/2 cursor-pointer active:scale-90 z-40" 
                                     style="top: ${hy}%; left: ${hx}%">
                                    <div class="p-2.5 rounded-2xl shadow-xl ring-4 ring-white ${h.beds > 0 ? 'bg-red-600' : 'bg-slate-400'} text-white">
                                        <i data-lucide="hospital" class="w-4 h-4"></i>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function BloodBankView() {
            return `
                <div class="p-4 pb-32 animate-in flex-1 overflow-y-auto hide-scrollbar space-y-4">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-xl">
                        <div class="flex items-center gap-4 mb-2">
                            <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center text-white"><i data-lucide="droplet" class="w-6 h-6"></i></div>
                            <h2 class="text-2xl font-black text-slate-900">${t().bloodBank}</h2>
                        </div>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">${t().inventoryNear}</p>
                    </div>

                    ${state.hospitals.map(h => `
                        <div onclick="setState({viewingHospitalDetail: '${h.id}'})" class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm cursor-pointer active:bg-slate-50 transition-colors">
                            <div class="flex justify-between items-center mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-slate-100 text-slate-400 rounded-xl flex items-center justify-center">
                                        <i data-lucide="navigation" class="w-5 h-5"></i>
                                    </div>
                                    <h4 class="font-black text-slate-800 text-sm truncate max-w-[140px]">${h.name}</h4>
                                </div>
                                <span class="text-[9px] font-black text-green-600 bg-green-50 px-2 py-1 rounded-md">LIVE STOCK</span>
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                ${Object.entries(h.blood).map(([type, q]) => `
                                    <div class="p-3 bg-slate-50 rounded-2xl text-center border border-slate-100">
                                        <p class="text-xs font-black text-slate-800">${type}</p>
                                        <p class="text-[10px] font-bold ${q > 0 ? 'text-green-600' : 'text-red-500'}">${q}u</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function FirstAidView() {
            const guides = FIRST_AID_GUIDES[state.lang];
            return `
                <div class="p-4 pb-32 animate-in flex-1 overflow-y-auto hide-scrollbar space-y-4">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-xl">
                        <div class="flex items-center gap-4 mb-2">
                            <div class="w-12 h-12 bg-teal-500 rounded-2xl flex items-center justify-center text-white"><i data-lucide="info" class="w-6 h-6"></i></div>
                            <h2 class="text-2xl font-black text-slate-900">${t().emergencyAid}</h2>
                        </div>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">${t().stepsFollow}</p>
                    </div>
                    ${guides.map(g => `
                        <div class="bg-white p-7 rounded-[2rem] border border-slate-100 shadow-sm">
                            <div class="flex items-center gap-4 mb-4">
                                <div class="w-12 h-12 ${g.color} text-white rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="${g.icon}" class="w-6 h-6"></i></div>
                                <h3 class="text-lg font-black text-slate-800">${g.title}</h3>
                            </div>
                            <div class="space-y-3">
                                ${g.steps.map((s, i) => `<div class="flex gap-4 items-start"><span class="w-6 h-6 bg-slate-50 rounded-full flex items-center justify-center text-[10px] font-black shrink-0 border border-slate-100">${i+1}</span><p class="text-xs font-medium text-slate-600 leading-relaxed">${s}</p></div>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // --- ADMIN VIEWS ---
        function LoginView() {
            return `
                <div class="h-full bg-slate-900 flex flex-col animate-in relative">
                    <button onclick="setState({view: 'user'})" class="absolute top-6 right-6 p-2 bg-white/10 rounded-full text-white backdrop-blur-md">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                    <div class="flex-1 flex flex-col justify-center p-8">
                        <div class="mb-10 text-center">
                            <div class="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-blue-500/40">
                                <i data-lucide="shield-check" class="text-white w-10 h-10"></i>
                            </div>
                            <h2 class="text-3xl font-black text-white tracking-tight">Hospital Portal</h2>
                            <p class="text-blue-400 font-bold uppercase tracking-widest text-[10px] mt-3">Authorized Personnel Only</p>
                        </div>
                        <div class="space-y-4 bg-white/5 p-6 rounded-[2.5rem] border border-white/10 backdrop-blur-lg">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Select Facility</label>
                                <select id="admin-hospital-select" class="w-full p-4 bg-slate-800 text-white rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold appearance-none">
                                    ${state.hospitals.map(h => `<option value="${h.id}">${h.name}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Secure Passcode</label>
                                <input type="password" value="demo123" class="w-full p-4 bg-slate-800 text-white rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold tracking-widest">
                            </div>
                            <button onclick="setState({view: 'admin', adminHospitalId: document.getElementById('admin-hospital-select').value})" class="w-full py-4 mt-2 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl shadow-blue-500/20 active:scale-95 transition-transform">
                                Authenticate
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function AdminPanelView() {
            const h = state.hospitals.find(h => h.id === state.adminHospitalId);
            if (!h) return '';

            return `
                <div class="h-full flex flex-col bg-slate-50 animate-in">
                    <!-- Admin Header -->
                    <div class="bg-slate-900 text-white p-6 pt-safe flex justify-between items-center shadow-xl z-10">
                        <div>
                            <span class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] flex items-center gap-1">
                                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> Live Dashboard
                            </span>
                            <h2 class="text-lg font-black truncate max-w-[200px] mt-1">${h.name}</h2>
                        </div>
                        <button onclick="setState({view: 'user', adminHospitalId: null})" class="p-3 bg-white/10 text-white rounded-xl active:scale-90 transition-transform">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto p-4 space-y-4 hide-scrollbar">
                        
                        <!-- Core Capacity -->
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                            <h3 class="font-black text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="bed" class="w-5 h-5 text-blue-500"></i> Ward Capacity</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                    <p class="text-[10px] font-black text-blue-500 uppercase mb-2">General Beds</p>
                                    <input type="number" value="${h.beds}" oninput="updateHospitalStat('${h.id}', 'beds', this.value)" class="text-3xl font-black text-blue-700 w-full bg-transparent outline-none">
                                </div>
                                <div class="p-4 bg-red-50 rounded-2xl border border-red-100">
                                    <p class="text-[10px] font-black text-red-500 uppercase mb-2">ICU Units</p>
                                    <input type="number" value="${h.icuBeds}" oninput="updateHospitalStat('${h.id}', 'icuBeds', this.value)" class="text-3xl font-black text-red-600 w-full bg-transparent outline-none">
                                </div>
                            </div>
                        </div>

                        <!-- Blood Stock -->
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                            <h3 class="font-black text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="droplet" class="w-5 h-5 text-orange-500"></i> Blood Bank Inventory</h3>
                            <div class="grid grid-cols-3 gap-3">
                                ${Object.entries(h.blood).map(([type, qty]) => `
                                    <div class="p-3 bg-slate-50 border border-slate-100 rounded-2xl text-center">
                                        <p class="text-xs font-black text-slate-400 mb-1">${type}</p>
                                        <input type="number" value="${qty}" oninput="updateHospitalBlood('${h.id}', '${type}', this.value)" class="text-xl text-center font-black text-slate-800 w-full bg-transparent outline-none border-b-2 border-transparent focus:border-orange-300 transition-colors">
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Staffing & Equipment -->
                        <div class="bg-slate-900 p-6 rounded-[2rem] text-white shadow-xl">
                            <h3 class="font-black mb-4 flex items-center gap-2 text-teal-400"><i data-lucide="activity" class="w-5 h-5"></i> Staff & Equipment</h3>
                            <div class="space-y-4">
                                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                                    <span class="text-sm font-bold">On-Duty Doctors</span>
                                    <input type="number" value="${h.doctors}" oninput="updateHospitalStat('${h.id}', 'doctors', this.value)" class="w-20 bg-white/10 rounded-xl p-2 text-center font-black text-lg outline-none focus:ring-2 focus:ring-teal-500">
                                </div>
                                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                                    <span class="text-sm font-bold">Available Ventilators</span>
                                    <input type="number" value="${h.ventilators}" oninput="updateHospitalStat('${h.id}', 'ventilators', this.value)" class="w-20 bg-white/10 rounded-xl p-2 text-center font-black text-lg outline-none focus:ring-2 focus:ring-teal-500">
                                </div>
                            </div>
                        </div>
                        
                        <!-- Padding for bottom button -->
                        <div class="h-24"></div>
                    </div>
                    
                    <div class="absolute bottom-0 left-0 right-0 p-6 bg-white border-t border-slate-100 pb-safe">
                        <button onclick="handleAdminPublish()" class="w-full py-4 bg-green-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl shadow-green-500/30 active:scale-95 transition-transform flex justify-center items-center gap-2">
                            <i data-lucide="upload-cloud" class="w-5 h-5"></i> Publish Live Updates
                        </button>
                    </div>
                </div>
            `;
        }

        // --- RENDER ENGINE ---
        function render() {
            const container = document.getElementById('app-container');
            
            if (state.loading) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center bg-slate-950 absolute inset-0 z-[1000]"><div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] flex items-center justify-center shadow-2xl mb-10 animate-bounce"><i data-lucide="zap" class="text-white w-12 h-12 fill-current"></i></div><span class="text-[11px] font-black tracking-[0.6em] text-white uppercase animate-pulse">LIFELINE INDIA</span></div>`;
                lucide.createIcons(); return;
            }

            if (state.view === 'login') {
                container.innerHTML = LoginView();
            } else if (state.view === 'admin') {
                container.innerHTML = AdminPanelView();
            } else {
                // Main User View
                let content = '';
                if(state.activeTab === 'home') content = UserHomeView();
                else if(state.activeTab === 'map') content = MapView();
                else if(state.activeTab === 'blood') content = BloodBankView();
                else if(state.activeTab === 'firstaid') content = FirstAidView();

                container.innerHTML = `
                    ${Header()}
                    <main class="flex-1 flex flex-col overflow-hidden relative bg-[#f8fafc]">${content}</main>
                    
                    <!-- Bottom Nav -->
                    <nav class="absolute bottom-0 w-full bg-white/95 backdrop-blur-2xl border-t border-slate-100 flex justify-around items-center p-4 pb-safe z-[200]">
                        ${[{ id: 'home', icon: 'home' }, { id: 'map', icon: 'map' }, { id: 'triage', icon: 'zap', central: true }, { id: 'blood', icon: 'droplet' }, { id: 'firstaid', icon: 'info' }].map(tab => {
                            if (tab.central) return `<div onclick="setState({activeTab: 'home'})" class="w-16 h-16 -mt-12 bg-blue-600 rounded-[2rem] flex items-center justify-center text-white shadow-2xl ring-8 ring-[#f8fafc] cursor-pointer active:scale-90 transition-transform"><i data-lucide="zap" class="w-7 h-7 fill-white"></i></div>`;
                            const isActive = state.activeTab === tab.id;
                            return `<button onclick="setState({activeTab: '${tab.id}'})" class="p-3 transition-all flex flex-col items-center gap-1 ${isActive ? 'text-blue-600 scale-110' : 'text-slate-300 active:scale-90'}"><i data-lucide="${tab.icon}" class="w-6 h-6 ${isActive ? 'fill-current' : ''}"></i></button>`;
                        }).join('')}
                    </nav>

                    <!-- AI FAB -->
                    <button onclick="setState({isAiModal: true})" class="fab-btn w-16 h-16 bg-slate-900 text-white rounded-[2rem] flex items-center justify-center shadow-2xl active:scale-90 transition-transform ring-4 ring-white/5">
                        <i data-lucide="bot" class="w-8 h-8"></i>
                    </button>

                    <!-- Modals & Toasts -->
                    ${state.isAiModal ? `
                        <div class="fixed inset-0 z-[1000] flex items-end justify-center bg-slate-900/40 backdrop-blur-sm px-4 pb-10 animate-in" onclick="setState({isAiModal: false})">
                            <div class="bg-white w-full max-w-md h-[85vh] rounded-[2.5rem] flex flex-col shadow-2xl overflow-hidden slide-up" onclick="event.stopPropagation()">
                                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="bot" class="text-white w-5 h-5"></i></div>
                                        <div><h2 class="text-lg font-black text-slate-900 leading-none">${t().aiTitle}</h2><p class="text-[10px] font-bold text-green-500 uppercase mt-1">${t().aiSub}</p></div>
                                    </div>
                                    <button onclick="setState({isAiModal: false})" class="p-2 bg-slate-50 rounded-xl text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
                                </div>
                                <div id="ai-chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 hide-scrollbar">
                                    ${state.aiMessages.map(m => `<div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}"><div class="max-w-[85%] p-4 rounded-3xl ${m.role === 'user' ? 'bg-blue-600 text-white rounded-br-none shadow-lg' : 'bg-white text-slate-700 border border-slate-100 rounded-bl-none shadow-sm'}"><p class="text-sm font-medium leading-relaxed">${m.text}</p></div></div>`).join('')}
                                    ${state.isAiThinking ? `<div class="flex justify-start"><div class="bg-white p-4 rounded-3xl flex gap-1 items-center shadow-sm"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>` : ''}
                                </div>
                                <div class="p-6 bg-white border-t border-slate-100 pb-safe">
                                    <form onsubmit="event.preventDefault(); const inp = this.querySelector('input'); askAI(inp.value); inp.value='';" class="relative">
                                        <input type="text" placeholder="${t().aiPlaceholder}" class="w-full pl-6 pr-14 py-5 rounded-[2rem] bg-slate-100 text-sm font-bold border-none outline-none focus:ring-2 focus:ring-blue-500/20" />
                                        <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all"><i data-lucide="send" class="w-4 h-4"></i></button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                    
                    ${HospitalDetailPopup()}
                    ${state.notification ? `<div class="fixed top-24 left-4 right-4 z-[300] animate-in bg-slate-900 text-white p-4 rounded-2xl font-black text-[10px] text-center uppercase tracking-widest shadow-2xl">${state.notification}</div>` : ''}
                `;
            }
            lucide.createIcons();
            
            // Auto-scroll chat to bottom
            const cb = document.getElementById('ai-chat-box'); 
            if(cb) cb.scrollTop = cb.scrollHeight;
        }

        window.addEventListener('load', () => {
            initApp();
        });
    </script>
</body>
</html>
