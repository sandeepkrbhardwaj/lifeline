<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lifeline India | Medical Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            touch-action: manipulation;
        }

        .animate-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .pulse-ring { animation: ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

        .radar-scan {
            width: 500px;
            height: 500px;
            background: conic-gradient(from 0deg, rgba(37, 99, 235, 0.15), transparent 90deg);
            border-radius: 50%;
            animation: scan 6s linear infinite;
        }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pt-safe { padding-top: max(1rem, var(--safe-top)); }
        .pb-safe { padding-bottom: max(1.5rem, var(--safe-bottom)); }

        .feature-card { transition: all 0.2s ease; cursor: pointer; }
        .feature-card:active { transform: scale(0.96); opacity: 0.9; }

        .fab-btn {
            position: fixed;
            bottom: calc(100px + var(--safe-bottom));
            right: 20px;
            z-index: 500;
        }

        .typing-dot { width: 4px; height: 4px; background: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        #app-container {
            width: 100%;
            height: 100dvh;
            background: #f8fafc;
        }

        @media (min-width: 640px) {
            #app-container { max-width: 28rem; margin: 0 auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        }

        .live-badge::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #ef4444;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        
        /* Remove arrows from number inputs in admin panel */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen">

    <div id="app-container" class="relative overflow-hidden flex flex-col">
        <!-- Application Engine -->
    </div>

    <!-- Firebase Integration as Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- FIREBASE CONFIG (Using your exact credentials) ---
        const userConfig = {
            apiKey: "AIzaSyA2FIugwti0ri5lA-XRoBuFMkDhq9LQYvE",
            authDomain: "hospital-a9b43.firebaseapp.com",
            projectId: "hospital-a9b43",
            storageBucket: "hospital-a9b43.firebasestorage.app",
            messagingSenderId: "124364489495",
            appId: "1:124364489495:web:59b44243d005c556da2d52",
            measurementId: "G-2BJG78RGFV"
        };
        
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lifeline-app';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- GEMINI API CONFIG ---
        const apiKey = ""; 

        // --- TRANSLATIONS ---
        const TRANSLATIONS = {
            en: {
                gridTitle: "Emergency Grid", searchPlaceholder: "Search Disease / Care...", searchTitle: "Search Disease / Specialist",
                bloodUnits: "Blood Units", realTimeStocks: "Real-time stocks", firstAid: "First Aid", emergencyGuides: "Emergency guides",
                matchedCenters: "Matched Centers (By Distance)", centersFound: "Centers", consultation: "Consult", beds: "Beds", wait: "Wait",
                specialistLive: "Specialist Live", bloodBank: "Blood Bank", inventoryNear: "Live inventory near you", emergencyAid: "Emergency Aid",
                stepsFollow: "Follow these until help arrives", aiGreet: "Namaste! I am Lifeline AI. I can check real hospital locations, available beds, and medicine stocks near you. How can I help?",
                aiTitle: "Lifeline AI", aiSub: "Direct Clinical Assistant", aiPlaceholder: "Explain symptoms (e.g. Heart pain)...",
                openMaps: "Open Google Maps", icuBeds: "ICU Beds", ventilators: "Ventilators", doctors: "Doctors", staff: "Support Staff",
                medStock: "Medical Stocks", liveStatus: "Live Status", panicSOS: "Panic SOS", call108: "Call 108", standby: "Paramedics are on standby"
            },
            hi: {
                gridTitle: "आपातकालीन ग्रिड", searchPlaceholder: "बीमारी / देखभाल खोजें...", searchTitle: "बीमारी या विशेषज्ञ खोजें",
                bloodUnits: "ब्लड यूनिट्स", realTimeStocks: "रियल-टाइम स्टॉक", firstAid: "प्राथमिक उपचार", emergencyGuides: "आपातकालीन गाइड",
                matchedCenters: "मिलते-जुलते अस्पताल (दूरी)", centersFound: "अस्पताल मिले", consultation: "परामर्श", beds: "बेड", wait: "प्रतीक्षा",
                specialistLive: "विशेषज्ञ उपलब्ध", bloodBank: "ब्लड बैंक", inventoryNear: "आपके पास उपलब्ध रक्त", emergencyAid: "आपातकालीन सहायता",
                stepsFollow: "मदद आने तक इनका पालन करें", aiGreet: "नमस्ते! मैं लाइफलाइन AI हूँ। मैं आपके क्षेत्र के अस्पतालों, बेड और दवाइयों की जानकारी दे सकता हूँ। मैं आपकी क्या मदद करूँ?",
                aiTitle: "लाइफलाइन AI", aiSub: "क्लिनिकल असिस्टेंट", aiPlaceholder: "लक्षण बताएं (जैसे सीने में दर्द)...",
                openMaps: "गूगल मैप्स खोलें", icuBeds: "ICU बेड", ventilators: "वेंटिलेटर", doctors: "डॉक्टर", staff: "सहायक कर्मचारी",
                medStock: "दवाओं का स्टॉक", liveStatus: "लाइव स्थिति", panicSOS: "इमरजेंसी SOS", call108: "108 कॉल करें", standby: "पैरामेडिक्स तैयार हैं"
            }
        };

        const FIRST_AID_GUIDES = {
            en: [
                { id: 'cpr', title: 'CPR (Adult)', steps: ['Check scene safety', 'Call 108/Emergency', 'Push hard & fast in center of chest', 'Allow full chest recoil', 'Give rescue breaths'], color: 'bg-red-500', icon: 'heart-pulse' },
                { id: 'choking', title: 'Choking / Heimlich', steps: ['Stand behind the person', 'Give 5 back blows', 'Give 5 abdominal thrusts', 'Repeat until object is out'], color: 'bg-orange-500', icon: 'wind' }
            ],
            hi: [
                { id: 'cpr', title: 'CPR (वयस्क)', steps: ['जगह की सुरक्षा जांचें', '108 कॉल करें', 'छाती के बीच में जोर से दबाएं', 'छाती को वापस आने दें', 'सांस दें'], color: 'bg-red-500', icon: 'heart-pulse' },
                { id: 'choking', title: 'दम घुटना (Heimlich)', steps: ['व्यक्ति के पीछे खड़े हों', 'पीठ पर 5 बार थपथपाएं', 'पेट पर 5 बार दबाव दें', 'वस्तु बाहर आने तक दोहराएं'], color: 'bg-orange-500', icon: 'wind' }
            ]
        };

        // --- APP STATE ---
        let state = {
            loading: true,
            view: 'user', 
            activeTab: 'home', 
            lang: 'en',
            location: { lat: 28.6139, lng: 77.2090, name: "Locating...", granted: false },
            osmHospitals: [], // Raw fetched data
            firebaseHospitals: [], // Synced cloud data
            hospitals: [], // Merged final display data
            searchQuery: '',
            isAiModal: false,
            aiMessages: [],
            isAiThinking: false,
            viewingHospitalDetail: null,
            adminHospitalId: null
        };
        window.state = state; 

        function t() { return TRANSLATIONS[state.lang]; }

        function setState(newState, forceRender = true) {
            state = { ...state, ...newState };
            window.state = state;
            if (forceRender) render();
        }
        window.setState = setState;

        // Non-destructive Toast Notification
        function showToast(msg) {
            const container = document.getElementById('app-container');
            if (!container) return;
            const toastId = 'toast-' + Date.now() + Math.random().toString(36).substring(2, 9);
            const toastHTML = `<div id="${toastId}" class="fixed top-24 left-4 right-4 z-[300] bg-slate-900 text-white p-4 rounded-2xl font-black text-[10px] text-center uppercase tracking-widest shadow-2xl" style="animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;">${msg}</div>`;
            container.insertAdjacentHTML('beforeend', toastHTML);
            
            setTimeout(() => {
                const t = document.getElementById(toastId);
                if (t) {
                    t.style.animation = 'fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) reverse forwards';
                    setTimeout(() => t.remove(), 300);
                }
            }, 3500);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // --- FIREBASE SYNC LOGIC ---
        function mergeHospitals() {
            let merged = [...state.osmHospitals];
            
            state.firebaseHospitals.forEach(fbH => {
                // ALWAYS recalculate distance dynamically based on the user's exact current location
                fbH.distance = calculateDistance(state.location.lat, state.location.lng, fbH.lat, fbH.lng);

                const existingIdx = merged.findIndex(h => h.id === fbH.id);
                if (existingIdx > -1) {
                    // Replace existing OSM data with Firebase Data and add the synced tag
                    merged[existingIdx] = { ...merged[existingIdx], ...fbH, isCloudSynced: true };
                } else {
                    // Inject entirely new hospitals registered via the app
                    merged.push({ ...fbH, isCloudSynced: true });
                }
            });

            // STRICTLY sort by distance ascending (Nearest hospitals come first)
            merged.sort((a, b) => a.distance - b.distance);
            state.hospitals = merged;
        }

        function listenToFirebaseHospitals() {
            const hospitalsRef = collection(db, 'artifacts', appId, 'public', 'data', 'hospitals');
            onSnapshot(hospitalsRef, (snapshot) => {
                const fbHospitals = [];
                snapshot.forEach(doc => {
                    fbHospitals.push({ id: doc.id, ...doc.data() });
                });
                state.firebaseHospitals = fbHospitals;
                console.log("📥 Fetched Saved Cloud Data:", fbHospitals);
                mergeHospitals();
                
                // Protect form inputs from wiping during background refresh
                if (state.loading) {
                    render();
                } else if (state.view === 'user' && state.activeTab === 'home') {
                    const container = document.getElementById('hospital-list-container');
                    if(container) {
                        container.innerHTML = window.renderHospitalList();
                        lucide.createIcons();
                    }
                } else if (state.view === 'user') {
                    render();
                }
            }, (error) => {
                console.error("Firebase Sync Error:", error);
                if (error.message.includes("permission") || error.message.includes("Missing or insufficient")) {
                    showToast("Database Locked: Go to your Firebase Console -> Firestore Database -> Rules and set them to 'allow read, write: if true;' for testing.");
                }
            });
        }

        // --- INITIALIZATION ---
        async function initApp() {
            state.aiMessages = [{ role: 'ai', text: TRANSLATIONS.en.aiGreet }];
            
            // Check for file:// protocol which blocks Firebase Auth
            if (window.location.protocol === 'file:') {
                setTimeout(() => showToast("⚠️ App opened directly. Firebase Auth requires a local server. Please use VS Code 'Live Server' extension!"), 2000);
            }

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("🔥 Auth Warning:", error.message);
                showToast("Firebase Auth Error: " + error.message);
            }

            onAuthStateChanged(auth, (user) => {
                if(user) {
                    console.log("✅ Authenticated securely. Listening to live database...");
                    listenToFirebaseHospitals();
                }
            });

            const fallbackTimer = setTimeout(() => {
                mergeHospitals(); // Ensure Firebase data merges even if location takes too long
                const shouldRender = state.loading || state.view === 'user';
                setState({ loading: false, location: { ...state.location, name: "Default Location" } }, shouldRender);
            }, 8000);

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    state.location.lat = latitude;
                    state.location.lng = longitude;
                    state.location.granted = true;

                    try {
                        const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18`);
                        const geoData = await geoRes.json();
                        const addr = geoData.display_name ? geoData.display_name.split(',').slice(0, 3).join(', ') : "Current Location";
                        state.location.name = addr;

                        const osmQuery = `[out:json];node["amenity"="hospital"](around:15000,${latitude},${longitude});out body;`;
                        const hospitalRes = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(osmQuery)}`);
                        const hData = await hospitalRes.json();

                        const specs = ["Cardiology", "Neurology", "Orthopedic", "General Medicine", "Pediatrics", "Trauma Care"];

                        state.osmHospitals = hData.elements.map(h => {
                            const genCost = Math.floor(Math.random() * 500) + 300;
                            const spec = specs[Math.floor(Math.random() * specs.length)];
                            return {
                                id: h.id.toString(),
                                name: h.tags.name || "Emergency Medical Center",
                                address: addr, 
                                lat: h.lat, lng: h.lon,
                                distance: calculateDistance(latitude, longitude, h.lat, h.lon),
                                beds: Math.floor(Math.random() * 40) + 10,
                                icuBeds: Math.floor(Math.random() * 12) + 2,
                                ventilators: Math.floor(Math.random() * 8) + 1,
                                doctors: Math.floor(Math.random() * 25) + 5,
                                paramedics: Math.floor(Math.random() * 15) + 3,
                                wait: Math.floor(Math.random() * 50) + 5,
                                cost: genCost,
                                specialty: spec,
                                doctorsList: [
                                    { type: 'General Physician', price: genCost },
                                    { type: spec, price: genCost + Math.floor(Math.random() * 800) + 200 }
                                ],
                                blood: { 'O+': Math.floor(Math.random()*15), 'AB-': Math.floor(Math.random()*3), 'B+': Math.floor(Math.random()*20) },
                                medicines: { "Oxygen Cylinders": Math.floor(Math.random()*25), "Aspirin": 120, "Insulin": 20 }
                            };
                        });

                        mergeHospitals(); // Ensures custom Firebase data instantly overrides the random fetched data
                        clearTimeout(fallbackTimer);
                        
                        const shouldRender = state.loading || state.view === 'user';
                        setState({ loading: false }, shouldRender);
                    } catch (e) {
                        mergeHospitals(); // Fallback: Show Firebase hospitals even if OSM map server crashes
                        clearTimeout(fallbackTimer);
                        const shouldRender = state.loading || state.view === 'user';
                        setState({ loading: false, location: { ...state.location, name: "Offline / Cloud Only Mode" } }, shouldRender);
                    }
                }, () => {
                    mergeHospitals(); // Fallback: Show Firebase hospitals if user denies location
                    clearTimeout(fallbackTimer);
                    const shouldRender = state.loading || state.view === 'user';
                    setState({ loading: false, location: { ...state.location, name: "Location Denied" } }, shouldRender);
                }, { timeout: 8000, enableHighAccuracy: true });
            } else {
                mergeHospitals();
                clearTimeout(fallbackTimer);
                const shouldRender = state.loading || state.view === 'user';
                setState({ loading: false }, shouldRender);
            }
        }

        // --- SEARCH HANDLING ---
        window.handleSearch = (val) => {
            state.searchQuery = val;
            window.state = state;
            const container = document.getElementById('hospital-list-container');
            if (container) {
                container.innerHTML = window.renderHospitalList();
                lucide.createIcons();
            }
        };

        window.renderHospitalList = () => {
            const query = state.searchQuery.toLowerCase();
            const filtered = state.hospitals.filter(h => {
                if (!query) return true;
                if (h.name.toLowerCase().includes(query) || h.specialty.toLowerCase().includes(query)) return true;
                if (h.doctorsList && h.doctorsList.some(d => d.type.toLowerCase().includes(query))) return true;
                return false;
            });

            let html = `
                <div class="flex justify-between items-center px-1">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${t().matchedCenters}</h3>
                    <span class="text-[10px] font-bold text-blue-600">${filtered.length} ${t().centersFound}</span>
                </div>
            `;

            if (filtered.length === 0) {
                html += `<div class="p-6 text-center text-slate-400 font-bold bg-white rounded-[2rem] border border-slate-100">No centers found matching criteria.</div>`;
            }

            html += filtered.map(h => `
                <div onclick="window.setState({viewingHospitalDetail: '${h.id}'})" class="bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col gap-4 active:scale-95 transition-all cursor-pointer relative overflow-hidden">
                    ${h.isCloudSynced ? `<div class="absolute top-0 right-0 bg-blue-500 text-white text-[8px] font-black px-3 py-1 rounded-bl-xl uppercase tracking-widest shadow-md">Cloud Synced</div>` : ''}
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center">
                                <i data-lucide="hospital" class="w-6 h-6"></i>
                            </div>
                            <div class="max-w-[140px]">
                                <h4 class="font-black text-slate-900 text-sm tracking-tight truncate">${h.name}</h4>
                                <p class="text-[9px] font-bold text-blue-500 uppercase">${h.distance.toFixed(2)} km • ${h.specialty}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-black text-green-600">₹${h.cost}</p>
                            <p class="text-[8px] font-bold text-slate-400 uppercase">${t().consultation}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 border-t border-slate-50 pt-3">
                        <span class="text-[8px] font-black text-slate-500 bg-slate-100 px-2 py-1 rounded-lg uppercase">${h.beds} ${t().beds}</span>
                        <span class="text-[8px] font-black text-red-500 bg-red-50 px-2 py-1 rounded-lg uppercase">${h.icuBeds} ICU</span>
                        <span class="text-[8px] font-black text-teal-600 bg-teal-50 px-2 py-1 rounded-lg uppercase">${t().specialistLive}</span>
                    </div>
                </div>
            `).join('');

            return html;
        };

        window.askAI = async (text) => {
            if (!text.trim() || !apiKey) return;
            const msgs = [...state.aiMessages, { role: 'user', text }];
            setState({ aiMessages: msgs, isAiThinking: true });

            const topHospitals = state.hospitals.slice(0, 3).map(h => `${h.name} (${h.beds} beds available)`).join(', ');
            const sysPrompt = `You are Lifeline AI. Location: ${state.location.name}. Top hospitals near user: ${topHospitals}. Language: ${state.lang === 'hi' ? 'Hindi' : 'English'}. Be extremely fast, concise, and helpful.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text }] }], systemInstruction: { parts: [{ text: sysPrompt }] } })
                });
                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Call 108 immediately for severe emergencies.";
                setState({ aiMessages: [...msgs, { role: 'ai', text: aiText }], isAiThinking: false });
            } catch (e) {
                setState({ aiMessages: [...msgs, { role: 'ai', text: "Connection error. Please try calling 108 directly." }], isAiThinking: false });
            }
        };

        window.handleNavigation = (hId) => {
            const h = state.hospitals.find(x => x.id === hId);
            if (!h) return;
            const url = `https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lng}&travelmode=driving`;
            window.open(url, '_blank');
        };

        // --- ADMIN AUTH & CLOUD UPDATE LOGIC ---
        window.handleLogin = () => {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            
            const admin = state.firebaseHospitals.find(a => a.adminUser === user && a.adminPass === pass);
            
            if (admin) {
                showToast("Cloud Auth Successful");
                setState({ view: 'admin', adminHospitalId: admin.id });
            } else if (user === 'admin' && pass === '123' && state.hospitals.length > 0) {
                setState({ view: 'admin', adminHospitalId: state.hospitals[0].id });
                showToast("Demo Auth Successful (Data will sync securely to Firebase)");
            } else {
                showToast("Invalid Credentials");
            }
        };

        window.handleRegister = async () => {
            if(!auth.currentUser) return showToast("⚠️ Auth missing. Ensure you are using VS Code Live Server.");

            const name = document.getElementById('reg-name').value;
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            const address = document.getElementById('reg-address').value || state.location.name;
            const lat = parseFloat(document.getElementById('reg-lat').value) || state.location.lat;
            const lng = parseFloat(document.getElementById('reg-lng').value) || state.location.lng;
            
            if(!name || !user || !pass) return showToast("Please fill all required fields");

            const newId = 'h-' + Date.now();
            const newHospital = {
                id: newId,
                name: name,
                address: address,
                adminUser: user,
                adminPass: pass, 
                lat: lat,
                lng: lng,
                distance: calculateDistance(state.location.lat, state.location.lng, lat, lng),
                beds: 50, icuBeds: 10, ventilators: 5, doctors: 15, paramedics: 20, wait: 10, cost: 500,
                specialty: "Multispecialty",
                doctorsList: [
                    { type: 'General Physician', price: 500 },
                    { type: 'Emergency Specialist', price: 1000 }
                ],
                blood: { 'O+': 20, 'AB-': 5, 'B+': 15 },
                medicines: { "Oxygen Cylinders": 30, "Aspirin": 200, "Insulin": 50 }
            };

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'hospitals', newId), newHospital);
                showToast("Facility Connected to Cloud Grid!");
                setState({ view: 'admin', adminHospitalId: newId });
            } catch (e) {
                if (e.message.includes("permission") || e.message.includes("Missing or insufficient")) {
                    showToast("Database Error: Go to Firestore -> Rules, and set 'allow read, write: if true;'");
                } else {
                    showToast("Error: " + e.message);
                }
            }
        };

        window.updateHospitalStat = (hId, key, value) => {
            const hospital = state.hospitals.find(h => h.id === hId);
            if (hospital) hospital[key] = parseInt(value) || 0;
        };
        window.updateHospitalBlood = (hId, bloodType, value) => {
            const hospital = state.hospitals.find(h => h.id === hId);
            if (hospital && hospital.blood) hospital.blood[bloodType] = parseInt(value) || 0;
        };
        window.updateHospitalMeds = (hId, medType, value) => {
            const hospital = state.hospitals.find(h => h.id === hId);
            if (hospital && hospital.medicines) hospital.medicines[medType] = parseInt(value) || 0;
        };
        window.updateDoctor = (hId, idx, key, val) => {
            const hospital = state.hospitals.find(h => h.id === hId);
            if (hospital && hospital.doctorsList) {
                hospital.doctorsList[idx][key] = key === 'price' ? parseInt(val) || 0 : val;
                if (idx === 0 && key === 'price') hospital.cost = parseInt(val) || 0;
            }
        };
        window.addDoctorSlot = (hId) => {
            const hospital = state.hospitals.find(h => h.id === hId);
            if (hospital) {
                if(!hospital.doctorsList) hospital.doctorsList = [];
                hospital.doctorsList.push({ type: '', price: 500 });
                render(); 
            }
        };

        window.handleAdminPublish = async () => {
            if(!auth.currentUser) return showToast("⚠️ Auth missing. Ensure you are using VS Code Live Server.");
            
            const h = state.hospitals.find(h => h.id === state.adminHospitalId);
            if (!h) return;

            try {
                // Ensure customized hospital gets saved securely to Firestore
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'hospitals', h.id), h, { merge: true });
                showToast("Live Updates Synced to Cloud Grid");
                setState({ view: 'user', adminHospitalId: null });
            } catch(e) {
                if (e.message.includes("permission") || e.message.includes("Missing or insufficient")) {
                    showToast("Database Error: Go to Firestore -> Rules, and set 'allow read, write: if true;'");
                } else {

                }
            }
        };

                            <div>

                                <input id="reg-user" type="text" placeholder="Choose a username" class="w-full p-4 bg-slate-800 text-white rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold text-sm">
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Admin Passcode *</label>
                                <input id="reg-pass" type="password" placeholder="Create a passcode" class="w-full p-4 bg-slate-800 text-white rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold tracking-widest text-sm">
                            </div>
                            
                            <div class="pt-2">
                                <button onclick="window.handleRegister()" class="w-full py-4 bg-green-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl shadow-green-500/20 active:scale-95 transition-transform flex justify-center items-center gap-2">
                                    <i data-lucide="server" class="w-4 h-4"></i> Establish Connection
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function AdminPanelView() {
            const h = state.hospitals.find(h => h.id === state.adminHospitalId);
            if (!h) return '';

            return `
                <div class="h-full flex flex-col bg-slate-50 animate-in relative">
                    <!-- Admin Header -->
                    <div class="bg-slate-900 text-white p-6 pt-safe flex justify-between items-center shadow-xl z-10">
                        <div>
                            <span class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] flex items-center gap-1">
                                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> Cloud Command
                            </span>
                            <h2 class="text-lg font-black truncate max-w-[200px] mt-1">${h.name}</h2>
                            <p class="text-[8px] text-slate-400 font-mono mt-1 opacity-70">ID: ${h.id}</p>
                        </div>
                        <button onclick="window.setState({view: 'user', adminHospitalId: null})" class="p-3 bg-white/10 text-white rounded-xl active:scale-90 transition-transform">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto p-4 space-y-4 hide-scrollbar">
                        
                        <!-- Core Capacity -->
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 relative overflow-hidden">
                            <h3 class="font-black text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="bed" class="w-5 h-5 text-blue-500"></i> Ward Capacity</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                    <p class="text-[10px] font-black text-blue-500 uppercase mb-2">General Beds</p>
                                    <input type="number" value="${h.beds}" oninput="window.updateHospitalStat('${h.id}', 'beds', this.value)" class="text-3xl font-black text-blue-700 w-full bg-transparent outline-none">
                                </div>
                                <div class="p-4 bg-red-50 rounded-2xl border border-red-100">
                                    <p class="text-[10px] font-black text-red-500 uppercase mb-2">ICU Units</p>
                                    <input type="number" value="${h.icuBeds}" oninput="window.updateHospitalStat('${h.id}', 'icuBeds', this.value)" class="text-3xl font-black text-red-600 w-full bg-transparent outline-none">
                                </div>
                            </div>
                        </div>

                        <!-- Specialists & Pricing -->
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                            <h3 class="font-black text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="stethoscope" class="w-5 h-5 text-blue-500"></i> Specialists & Pricing</h3>
                            <div class="space-y-3" id="admin-doctors-list">
                                ${(h.doctorsList || []).map((doc, idx) => `
                                    <div class="flex gap-2 items-center">
                                        <input type="text" value="${doc.type}" onchange="window.updateDoctor('${h.id}', ${idx}, 'type', this.value)" class="flex-1 p-3 bg-slate-50 rounded-xl border border-slate-100 text-xs font-bold text-slate-800" placeholder="Specialist Type">
                                        <input type="number" value="${doc.price}" onchange="window.updateDoctor('${h.id}', ${idx}, 'price', this.value)" class="w-24 p-3 bg-slate-50 rounded-xl border border-slate-100 text-xs font-bold text-slate-800 text-center" placeholder="₹ Price">
                                    </div>
                                `).join('')}
                                <button onclick="window.addDoctorSlot('${h.id}')" class="w-full py-3 bg-blue-50 text-blue-600 rounded-xl font-bold text-xs uppercase tracking-widest border border-blue-100">+ Add Specialist</button>
                            </div>
                        </div>

                        <!-- Blood Stock -->
                        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                            <h3 class="font-black text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="droplet" class="w-5 h-5 text-orange-500"></i> Blood Bank Inventory</h3>
                            <div class="grid grid-cols-3 gap-3">
                                ${Object.entries(h.blood).map(([type, qty]) => `
                                    <div class="p-3 bg-slate-50 border border-slate-100 rounded-2xl text-center">
                                        <p class="text-xs font-black text-slate-400 mb-1">${type}</p>
                                        <input type="number" value="${qty}" oninput="window.updateHospitalBlood('${h.id}', '${type}', this.value)" class="text-xl text-center font-black text-slate-800 w-full bg-transparent outline-none border-b-2 border-transparent focus:border-orange-300 transition-colors">
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Staffing & Crucial Equipment -->
                        <div class="bg-slate-900 p-6 rounded-[2rem] text-white shadow-xl">
                            <h3 class="font-black mb-4 flex items-center gap-2 text-teal-400"><i data-lucide="activity" class="w-5 h-5"></i> Resources & Staff</h3>
                            <div class="space-y-4">
                                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                                    <span class="text-sm font-bold">Oxygen Cylinders (O2)</span>
                                    <input type="number" value="${h.medicines["Oxygen Cylinders"] || 0}" oninput="window.updateHospitalMeds('${h.id}', 'Oxygen Cylinders', this.value)" class="w-20 bg-white/10 text-teal-400 rounded-xl p-2 text-center font-black text-lg outline-none focus:ring-2 focus:ring-teal-500">
                                </div>
                                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                                    <span class="text-sm font-bold">On-Duty Doctors</span>
                                    <input type="number" value="${h.doctors}" oninput="window.updateHospitalStat('${h.id}', 'doctors', this.value)" class="w-20 bg-white/10 rounded-xl p-2 text-center font-black text-lg outline-none focus:ring-2 focus:ring-teal-500">
                                </div>
                                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                                    <span class="text-sm font-bold">Active Ventilators</span>
                                    <input type="number" value="${h.ventilators}" oninput="window.updateHospitalStat('${h.id}', 'ventilators', this.value)" class="w-20 bg-white/10 rounded-xl p-2 text-center font-black text-lg outline-none focus:ring-2 focus:ring-teal-500">
                                </div>
                            </div>
                        </div>
                        
                        <!-- Padding for bottom button -->
                        <div class="h-28"></div>
                    </div>
                    
                    <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent pb-safe">
                        <button onclick="window.handleAdminPublish()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl shadow-blue-500/30 active:scale-95 transition-transform flex justify-center items-center gap-2">
                            <i data-lucide="cloud-upload" class="w-5 h-5"></i> Sync To Firebase
                        </button>
                    </div>
                </div>
            `;
        }

        // --- RENDER ENGINE ---
        function render() {
            const container = document.getElementById('app-container');
            
            if (state.loading) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center bg-slate-950 absolute inset-0 z-[1000]"><div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] flex items-center justify-center shadow-2xl mb-10 animate-bounce"><i data-lucide="zap" class="text-white w-12 h-12 fill-current"></i></div><span class="text-[11px] font-black tracking-[0.6em] text-white uppercase animate-pulse">LIFELINE INDIA</span></div>`;
                lucide.createIcons(); return;
            }

            if (state.view === 'login') {
                container.innerHTML = LoginView();
            } else if (state.view === 'register') {
                container.innerHTML = RegisterView();
            } else if (state.view === 'admin') {
                container.innerHTML = AdminPanelView();
            } else {
                let content = '';
                if(state.activeTab === 'home') content = UserHomeView();
                else if(state.activeTab === 'map') content = MapView();
                else if(state.activeTab === 'blood') content = BloodBankView();
                else if(state.activeTab === 'firstaid') content = FirstAidView();

                container.innerHTML = `
                    ${Header()}
                    <main class="flex-1 flex flex-col overflow-hidden relative bg-[#f8fafc]">${content}</main>
                    
                    <nav class="absolute bottom-0 w-full bg-white/95 backdrop-blur-2xl border-t border-slate-100 flex justify-around items-center p-4 pb-safe z-[200]">
                        ${[{ id: 'home', icon: 'home' }, { id: 'map', icon: 'map' }, { id: 'triage', icon: 'zap', central: true }, { id: 'blood', icon: 'droplet' }, { id: 'firstaid', icon: 'info' }].map(tab => {
                            if (tab.central) return `<div onclick="window.setState({activeTab: 'home'})" class="w-16 h-16 -mt-12 bg-blue-600 rounded-[2rem] flex items-center justify-center text-white shadow-2xl ring-8 ring-[#f8fafc] cursor-pointer active:scale-90 transition-transform"><i data-lucide="zap" class="w-7 h-7 fill-white"></i></div>`;
                            const isActive = state.activeTab === tab.id;
                            return `<button onclick="window.setState({activeTab: '${tab.id}'})" class="p-3 transition-all flex flex-col items-center gap-1 ${isActive ? 'text-blue-600 scale-110' : 'text-slate-300 active:scale-90'}"><i data-lucide="${tab.icon}" class="w-6 h-6 ${isActive ? 'fill-current' : ''}"></i></button>`;
                        }).join('')}
                    </nav>

                    <button onclick="window.setState({isAiModal: true})" class="fab-btn w-16 h-16 bg-slate-900 text-white rounded-[2rem] flex items-center justify-center shadow-2xl active:scale-90 transition-transform ring-4 ring-white/5">
                        <i data-lucide="bot" class="w-8 h-8"></i>
                    </button>

                    ${state.isAiModal ? `
                        <div class="fixed inset-0 z-[1000] flex items-end justify-center bg-slate-900/40 backdrop-blur-sm px-4 pb-10 animate-in" onclick="window.setState({isAiModal: false})">
                            <div class="bg-white w-full max-w-md h-[85vh] rounded-[2.5rem] flex flex-col shadow-2xl overflow-hidden slide-up" onclick="event.stopPropagation()">
                                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="bot" class="text-white w-5 h-5"></i></div>
                                        <div><h2 class="text-lg font-black text-slate-900 leading-none">${t().aiTitle}</h2><p class="text-[10px] font-bold text-green-500 uppercase mt-1">${t().aiSub}</p></div>
                                    </div>
                                    <button onclick="window.setState({isAiModal: false})" class="p-2 bg-slate-50 rounded-xl text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
                                </div>
                                <div id="ai-chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 hide-scrollbar">
                                    ${state.aiMessages.map(m => `<div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}"><div class="max-w-[85%] p-4 rounded-3xl ${m.role === 'user' ? 'bg-blue-600 text-white rounded-br-none shadow-lg' : 'bg-white text-slate-700 border border-slate-100 rounded-bl-none shadow-sm'}"><p class="text-sm font-medium leading-relaxed">${m.text}</p></div></div>`).join('')}
                                    ${state.isAiThinking ? `<div class="flex justify-start"><div class="bg-white p-4 rounded-3xl flex gap-1 items-center shadow-sm"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>` : ''}
                                </div>
                                <div class="p-6 bg-white border-t border-slate-100 pb-safe">
                                    <form onsubmit="event.preventDefault(); const inp = this.querySelector('input'); window.askAI(inp.value); inp.value='';" class="relative">
                                        <input type="text" placeholder="${t().aiPlaceholder}" class="w-full pl-6 pr-14 py-5 rounded-[2rem] bg-slate-100 text-sm font-bold border-none outline-none focus:ring-2 focus:ring-blue-500/20" />
                                        <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all"><i data-lucide="send" class="w-4 h-4"></i></button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                    
                    ${HospitalDetailPopup()}
                `;
            }
            lucide.createIcons();
            
            const cb = document.getElementById('ai-chat-box'); 
            if(cb) cb.scrollTop = cb.scrollHeight;
        }

        // Render initial loading state immediately to prevent blank screen
        render();

        window.addEventListener('load', () => {
            initApp();
        });
    </script>
</body>
</html>
