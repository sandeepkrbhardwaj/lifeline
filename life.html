<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lifeline India - Seconds Matter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --primary: #2563eb;
            --danger: #dc2626;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            touch-action: manipulation;
        }

        .animate-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .pulse-ring {
            animation: ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .radar-scan {
            width: 300px;
            height: 300px;
            background: conic-gradient(from 0deg, rgba(37, 99, 235, 0.2), transparent 90deg);
            border-radius: 50%;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pt-safe { padding-top: max(1rem, var(--safe-top)); }
        .pb-safe { padding-bottom: max(1.5rem, var(--safe-bottom)); }

        .route-path {
            stroke-dasharray: 8;
            animation: dash 20s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -1000; }
        }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen">

    <div id="app-container" class="max-w-md w-full bg-white h-[100dvh] shadow-2xl relative overflow-hidden flex flex-col">
        <!-- JS will inject content here -->
    </div>

    <script>
        // --- CONSTANTS & STATE ---
        const TRANSLATIONS = {
            en: {
                appName: "Lifeline India",
                tagline: "Every Second Counts.",
                quickSearch: "Triage AI",
                medSearch: "Med Finder",
                liveStatus: "Live Location",
                beds: "Beds",
                wait: "Wait",
                navigate: "Emergency Route",
                emergency: "Call SOS",
                bestMatch: "Priority for",
                erStatus: "ER Ready",
                notifySent: "Hospital Notified! Path Locked.",
                vitals: "Vitals Log",
                tracker: "Ambulance Radar",
                contacts: "Quick SOS",
                vault: "My Records",
                fetching: "Detecting Location...",
                nearbyAmbulance: "Ambulances in Range",
                calculating: "Plotting Best Route..."
            },
            hi: {
                appName: "लाइफलाइन इंडिया",
                tagline: "हर पल कीमती है।",
                quickSearch: "लक्षण जांच",
                medSearch: "दवा खोजें",
                liveStatus: "लाइव स्थान",
                beds: "बेड",
                wait: "समय",
                navigate: "आपातकालीन रास्ता",
                emergency: "कॉल SOS",
                bestMatch: "विशेषज्ञता",
                erStatus: "ER तैयार",
                notifySent: "अस्पताल को सूचित किया गया!",
                vitals: "वाइटल लॉग",
                tracker: "एम्बुलेंस रडार",
                contacts: "त्वरित SOS",
                vault: "रिकॉर्ड्स",
                fetching: "स्थान खोज रहे हैं...",
                nearbyAmbulance: "पास की एम्बुलेंस",
                calculating: "रास्ता बनाया जा रहा है..."
            }
        };

        let state = {
            lang: 'en',
            activeTab: 'home',
            isAdmin: false,
            location: { lat: 0, lng: 0, name: null },
            hospitals: [
                { id: 'h1', name: "AIIMS - Trauma Center", beds: 4, wait: 12, x: 65, y: 35, specialty: "Cardiology", distance: "1.2 km", traffic: 'Low', medicines: { "Aspirin": 150, "Oxygen": 40 } },
                { id: 'h2', name: "Fortis Memorial", beds: 18, wait: 8, x: 25, y: 60, specialty: "Neurology", distance: "4.5 km", traffic: 'Moderate', medicines: { "Mannitol": 30, "Antibiotics": 200 } },
                { id: 'h3', name: "Apollo Hospitals", beds: 0, wait: 45, x: 80, y: 75, specialty: "Orthopedics", distance: "6.8 km", traffic: 'Heavy', medicines: { "Morphine": 12, "Oxygen": 5 } }
            ],
            ambulances: [
                { id: 'a1', x: 55, y: 45, dist: '400m', time: '2m' },
                { id: 'a2', x: 40, y: 55, dist: '1.2km', time: '5m' }
            ],
            searchQuery: '',
            medQuery: '',
            selectedHospital: null,
            loading: true,
            notification: null,
            tokenBooked: null,
            isVitalsModal: false
        };

        // --- CORE FUNCTIONS ---
        function t() { return TRANSLATIONS[state.lang]; }

        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        function showToast(msg) {
            state.notification = msg;
            render();
            setTimeout(() => {
                state.notification = null;
                render();
            }, 3000);
        }

        function getTriageResult() {
            const q = state.searchQuery.toLowerCase();
            if (!q || q.length < 3) return null;
            if (q.includes('chest') || q.includes('heart') || q.includes('सीने')) 
                return { dept: state.lang === 'hi' ? 'हृदय रोग' : 'Cardiology', color: 'bg-red-500', urgency: 'CRITICAL', aid: 'Sit upright, chew aspirin if prescribed.' };
            if (q.includes('bone') || q.includes('accident') || q.includes('हड्डी')) 
                return { dept: state.lang === 'hi' ? 'अस्थि रोग' : 'Orthopedics', color: 'bg-orange-500', urgency: 'HIGH', aid: 'Keep limb still, apply cold compress.' };
            return { dept: state.lang === 'hi' ? 'सामान्य' : 'General', color: 'bg-blue-500', urgency: 'STABLE', aid: 'Rest and hydrate until medical arrival.' };
        }

        // --- COMPONENTS ---

        function Header() {
            const locName = state.location.name || t().fetching;
            return `
                <div class="bg-white/95 backdrop-blur-xl p-4 pt-safe flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                            <i data-lucide="zap" class="text-white fill-white w-5 h-5"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h1 class="text-lg font-black text-slate-900 tracking-tight leading-none uppercase">${t().appName}</h1>
                            <div class="flex items-center gap-1 mt-1">
                                <span class="w-1.5 h-1.5 bg-green-500 rounded-full pulse-fast"></span>
                                <p class="text-[9px] text-slate-400 font-bold uppercase truncate max-w-[120px]">${locName}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setState({isVitalsModal: true})" class="p-2.5 bg-slate-50 border border-slate-100 rounded-xl text-slate-600 active:scale-90 transition-transform">
                            <i data-lucide="activity" class="w-5 h-5"></i>
                        </button>
                        <button onclick="setState({lang: state.lang === 'en' ? 'hi' : 'en'})" class="px-3 py-1.5 bg-slate-900 rounded-xl text-[10px] font-black text-white flex items-center gap-2 active:scale-90 transition-transform">
                            ${state.lang === 'en' ? 'हिन्दी' : 'EN'}
                        </button>
                    </div>
                </div>
            `;
        }

        function HomeView() {
            return `
                <div class="p-5 space-y-6 pb-32 animate-in overflow-y-auto flex-1 hide-scrollbar">
                    <!-- Dynamic Location Banner -->
                    <div onclick="setState({activeTab: 'map'})" class="bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden active:scale-[0.98] transition-all cursor-pointer">
                        <div class="absolute -right-5 -top-5 w-40 h-40 bg-blue-600/20 rounded-full blur-3xl"></div>
                        <div class="relative z-10">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">${t().liveStatus}</p>
                                    <h2 class="text-xl font-black leading-tight">${state.location.name || 'Detecting Area...'}</h2>
                                </div>
                                <div class="bg-white/10 p-2 rounded-xl backdrop-blur-md">
                                    <i data-lucide="map-pin" class="w-5 h-5 text-blue-400"></i>
                                </div>
                            </div>
                            <div class="bg-white/5 border border-white/10 p-4 rounded-3xl flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center">
                                        <i data-lucide="navigation" class="w-5 h-5 animate-pulse"></i>
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase">Nearest AIIMS</p>
                                        <p class="text-xs font-black">1.2 km • 4m ETA</p>
                                    </div>
                                </div>
                                <i data-lucide="chevron-right" class="text-slate-500"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Enhanced Features Grid -->
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="setState({activeTab: 'triage'})" class="p-5 bg-white rounded-3xl border border-slate-100 shadow-sm text-left active:scale-[0.98] transition-transform">
                            <div class="w-10 h-10 bg-red-500 rounded-2xl flex items-center justify-center text-white mb-3 shadow-lg shadow-red-500/20">
                                <i data-lucide="stethoscope" class="w-5 h-5"></i>
                            </div>
                            <h3 class="font-bold text-slate-800 text-sm">${t().quickSearch}</h3>
                            <p class="text-[9px] text-slate-400 mt-1 font-bold">SYMPTOM AI</p>
                        </button>
                        <button onclick="setState({activeTab: 'meds'})" class="p-5 bg-white rounded-3xl border border-slate-100 shadow-sm text-left active:scale-[0.98] transition-transform">
                            <div class="w-10 h-10 bg-blue-500 rounded-2xl flex items-center justify-center text-white mb-3 shadow-lg shadow-blue-500/20">
                                <i data-lucide="package" class="w-5 h-5"></i>
                            </div>
                            <h3 class="font-bold text-slate-800 text-sm">${t().medSearch}</h3>
                            <p class="text-[9px] text-slate-400 mt-1 font-bold">LIVE STOCKS</p>
                        </button>
                    </div>

                    <!-- Ambulance Radar Section -->
                    <div onclick="setState({activeTab: 'map'})" class="bg-blue-50 border border-blue-100 p-5 rounded-[2.5rem] flex items-center justify-between shadow-sm active:scale-[0.98] transition-all">
                        <div class="flex items-center gap-4">
                            <div class="relative">
                                <div class="w-14 h-14 bg-blue-600 rounded-[1.5rem] flex items-center justify-center text-white z-10 relative">
                                    <i data-lucide="truck" class="w-6 h-6"></i>
                                </div>
                                <div class="absolute inset-0 bg-blue-600 rounded-[1.5rem] pulse-ring"></div>
                            </div>
                            <div>
                                <h4 class="text-sm font-black text-slate-800 tracking-tight">${t().nearbyAmbulance}</h4>
                                <p class="text-[10px] text-blue-600 font-bold uppercase mt-1">2 Active within 2km</p>
                            </div>
                        </div>
                        <div class="text-right">
                             <p class="text-xs font-black text-slate-800">4 min</p>
                             <p class="text-[8px] text-slate-400 font-bold uppercase">Estimated</p>
                        </div>
                    </div>

                    <!-- Priority Admission Centers -->
                    <div>
                        <div class="flex justify-between items-center mb-4 px-1">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Urgent Intake Centers</h3>
                            <i data-lucide="info" class="w-3 h-3 text-slate-300"></i>
                        </div>
                        <div class="space-y-4">
                            ${state.hospitals.map(h => `
                                <div onclick="setState({selectedHospital: ${JSON.stringify(h).replace(/"/g, '&quot;')}, activeTab: 'map'})" class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-4 active:bg-slate-50 transition-colors cursor-pointer">
                                    <div class="w-12 h-12 rounded-2xl flex flex-col items-center justify-center ${h.beds > 0 ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}">
                                        <span class="text-lg font-black">${h.beds}</span>
                                        <span class="text-[7px] font-bold uppercase">Beds</span>
                                    </div>
                                    <div class="flex-1">
                                        <h4 class="font-bold text-slate-800 text-sm">${h.name}</h4>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase mt-1 flex items-center gap-1"><i data-lucide="navigation" class="w-2.5 h-2.5"></i> ${h.distance} • ${h.specialty}</p>
                                    </div>
                                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-200"></i>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Emergency SOS Footer -->
                    <div class="bg-red-600 p-6 rounded-[2.5rem] text-white flex justify-between items-center shadow-xl shadow-red-500/30">
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">${t().emergency}</p>
                            <h3 class="text-2xl font-black italic tracking-tighter uppercase">Dial 108</h3>
                            <p class="text-[10px] font-bold mt-1 text-red-100">National Emergency Support</p>
                        </div>
                        <a href="tel:108" class="w-16 h-16 bg-white rounded-[1.8rem] flex items-center justify-center text-red-600 shadow-xl active:scale-90 transition-transform">
                            <i data-lucide="phone" class="w-8 h-8 fill-current"></i>
                        </a>
                    </div>
                </div>
            `;
        }

        function MapView() {
            const hData = state.hospitals;
            const aData = state.ambulances;
            const center = { x: 50, y: 50 }; // Current user pos

            let routeMarkup = '';
            if (state.selectedHospital) {
                // Generate a "Dynamic Route" Path using SVG
                routeMarkup = `
                    <svg class="absolute inset-0 w-full h-full pointer-events-none z-10" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <path d="M ${center.x} ${center.y} Q ${center.x + (state.selectedHospital.x - center.x)/2 + 10} ${center.y + (state.selectedHospital.y - center.y)/2} ${state.selectedHospital.x} ${state.selectedHospital.y}" 
                              fill="none" stroke="#2563eb" stroke-width="0.8" class="route-path" stroke-linecap="round" />
                    </svg>
                `;
            }

            return `
                <div class="flex-1 bg-slate-100 relative overflow-hidden flex flex-col animate-in">
                    <!-- The Interactive Radar Map -->
                    <div class="flex-1 relative bg-slate-200 overflow-hidden">
                        <!-- Grid Overlay -->
                        <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(#64748b 1px, transparent 1px); background-size: 30px 30px;"></div>
                        
                        <!-- Radar Scanner Effect -->
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-0">
                             <div class="radar-scan"></div>
                        </div>

                        ${routeMarkup}

                        <!-- User Pin -->
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20">
                             <div class="w-6 h-6 bg-blue-600 rounded-full border-4 border-white shadow-xl relative">
                                <div class="absolute inset-0 bg-blue-600 rounded-full pulse-ring"></div>
                             </div>
                        </div>

                        <!-- Hospital Markers -->
                        ${hData.map(h => `
                            <div 
                                onclick="setState({selectedHospital: ${JSON.stringify(h).replace(/"/g, '&quot;')}, tokenBooked: null})"
                                class="absolute cursor-pointer transition-all duration-300 transform -translate-x-1/2 -translate-y-1/2 ${state.selectedHospital?.id === h.id ? 'scale-125 z-30' : 'scale-100 z-10'}"
                                style="top: ${h.y}%; left: ${h.x}%"
                            >
                                <div class="p-2.5 rounded-2xl shadow-xl ring-4 ring-white ${h.beds > 0 ? 'bg-blue-600' : 'bg-red-500'} text-white">
                                    <i data-lucide="hospital" class="w-5 h-5"></i>
                                </div>
                            </div>
                        `).join('')}

                        <!-- Ambulance Markers -->
                        ${aData.map(a => `
                            <div class="absolute transform -translate-x-1/2 -translate-y-1/2 transition-all duration-1000 z-20" style="top: ${a.y}%; left: ${a.x}%">
                                <div class="p-2 bg-slate-900 text-white rounded-xl shadow-xl flex items-center gap-1.5 border border-white/20">
                                    <i data-lucide="truck" class="w-3 h-3 text-yellow-400 animate-pulse"></i>
                                    <span class="text-[8px] font-black">${a.dist}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Bottom Hospital Sheet -->
                    ${state.selectedHospital ? `
                        <div class="absolute bottom-28 left-4 right-4 bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 p-8 slide-up z-40">
                            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-6"></div>
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <div class="flex gap-2 mb-2">
                                        <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-lg uppercase">${state.selectedHospital.specialty}</span>
                                        <span class="text-[9px] font-black text-green-600 bg-green-50 px-2 py-1 rounded-lg uppercase">${state.selectedHospital.traffic} Traffic</span>
                                    </div>
                                    <h3 class="text-2xl font-black text-slate-900 leading-tight">${state.selectedHospital.name}</h3>
                                    <p class="text-xs text-slate-400 font-bold mt-1 flex items-center gap-1">
                                        <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> Driving Route: ${state.selectedHospital.distance}
                                    </p>
                                </div>
                                <button onclick="setState({selectedHospital: null})" class="p-2.5 bg-slate-50 rounded-2xl text-slate-400">
                                    <i data-lucide="x" class="w-5 h-5"></i>
                                </button>
                            </div>

                            <button 
                                onclick="handleNavigation()" 
                                class="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black text-sm uppercase tracking-widest shadow-xl shadow-blue-500/30 flex items-center justify-center gap-3 active:scale-[0.98] transition-all"
                            >
                                ${t().navigate} <i data-lucide="arrow-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    ` : `
                        <div class="absolute bottom-28 left-6 right-6 p-4 bg-slate-900/90 backdrop-blur-md rounded-3xl text-white text-center animate-in">
                            <p class="text-[10px] font-black uppercase tracking-[0.3em]">${t().tracker}</p>
                            <p class="text-xs font-medium opacity-60 mt-1">Select a center to calculate route</p>
                        </div>
                    `}
                </div>
            `;
        }

        function TriageView() {
            const triageResult = getTriageResult();
            return `
                <div class="p-5 pb-32 animate-in flex-1 overflow-y-auto hide-scrollbar">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl min-h-full">
                        <h2 class="text-2xl font-black text-slate-900 mb-2">${t().quickSearch}</h2>
                        <p class="text-sm text-slate-400 font-medium mb-8">AI analysis of symptoms & routing.</p>
                        
                        <div class="relative mb-8">
                            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                            <input 
                                id="triage-input"
                                type="text" 
                                placeholder="${t().placeholder || 'Enter symptoms...'}"
                                class="w-full pl-14 pr-5 py-6 rounded-3xl bg-slate-50 text-slate-800 font-medium focus:outline-none focus:ring-4 focus:ring-blue-500/10 transition-all border-none placeholder-slate-300"
                                value="${state.searchQuery}"
                                oninput="setState({searchQuery: this.value})"
                            />
                        </div>

                        ${triageResult ? `
                            <div class="space-y-6 animate-in">
                                <div class="p-7 rounded-[2.5rem] text-white ${triageResult.color} shadow-2xl relative overflow-hidden">
                                    <div class="flex justify-between items-start mb-6">
                                        <div>
                                            <p class="text-[10px] font-bold uppercase opacity-80 tracking-widest mb-1">${t().recommended}</p>
                                            <p class="text-2xl font-black leading-tight">${triageResult.dept}</p>
                                        </div>
                                        <div class="bg-white/20 p-3 rounded-2xl">
                                            <i data-lucide="shield-alert" class="w-6 h-6"></i>
                                        </div>
                                    </div>
                                    <div class="bg-black/20 p-5 rounded-3xl">
                                        <p class="text-sm font-bold leading-relaxed">${triageResult.aid}</p>
                                    </div>
                                </div>
                                ${state.hospitals.map(h => `
                                    <button onclick="setState({selectedHospital: ${JSON.stringify(h).replace(/"/g, '&quot;')}, activeTab: 'map'})" class="w-full p-5 bg-slate-50 rounded-[2rem] border border-slate-100 flex justify-between items-center text-left active:scale-[0.98]">
                                        <div>
                                            <h4 class="font-black text-slate-800 text-sm">${h.name}</h4>
                                            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">${h.distance} • EMERGENCY UNIT READY</p>
                                        </div>
                                        <i data-lucide="arrow-right" class="w-5 h-5 text-slate-300"></i>
                                    </button>
                                `).join('')}
                            </div>
                        ` : `
                            <div class="py-24 text-center">
                                <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i data-lucide="activity" class="w-8 h-8 text-slate-200"></i>
                                </div>
                                <p class="text-slate-400 font-black uppercase tracking-widest text-[10px]">Ready for diagnosis</p>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        function MedSearchView() {
            return `
                <div class="p-5 pb-32 animate-in flex-1 overflow-y-auto hide-scrollbar">
                    <div class="bg-white p-7 rounded-[2.5rem] border border-slate-100 shadow-xl mb-6">
                        <h2 class="text-2xl font-black text-slate-900 mb-2">${t().medSearch}</h2>
                        <p class="text-xs text-slate-400 mb-6">Real-time pharmacy & blood units.</p>
                        <div class="relative">
                            <i data-lucide="box" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                            <input 
                                type="text" 
                                placeholder="Oxygen, AB+ Blood, Aspirin..."
                                class="w-full pl-14 pr-5 py-5 rounded-[2rem] bg-slate-50 text-slate-800 font-medium focus:outline-none border-none placeholder-slate-300"
                                value="${state.medQuery}"
                                oninput="setState({medQuery: this.value})"
                            />
                        </div>
                    </div>

                    <div class="space-y-4">
                        ${state.hospitals.map(h => {
                            const meds = Object.entries(h.medicines).filter(([n]) => !state.medQuery || n.toLowerCase().includes(state.medQuery.toLowerCase()));
                            if (state.medQuery && meds.length === 0) return '';
                            return `
                                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                    <h4 class="font-black text-slate-800 text-sm mb-4">${h.name}</h4>
                                    <div class="space-y-2">
                                        ${meds.map(([n, q]) => `
                                            <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                                                <span class="text-xs font-black text-slate-600 uppercase tracking-tight">${n}</span>
                                                <span class="text-[10px] font-black px-3 py-1.5 rounded-xl ${q > 10 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} uppercase">${q} UNITS</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function BottomNav() {
            const tabs = [
                { id: 'home', icon: 'home', label: 'Home' },
                { id: 'map', icon: 'radar', label: 'Map' },
                { id: 'triage', icon: 'zap', central: true },
                { id: 'meds', icon: 'package', label: 'Meds' },
                { id: 'admin', icon: 'settings', label: 'Admin' }
            ];

            return `
                <nav class="fixed bottom-0 max-w-md w-full bg-white/95 backdrop-blur-2xl border-t border-slate-100 flex justify-around items-center p-4 pb-safe z-[200]">
                    ${tabs.map(tab => {
                        if (tab.central) {
                            return `
                                <div onclick="setState({activeTab: 'triage'})" class="w-16 h-16 -mt-12 bg-blue-600 rounded-[2rem] flex items-center justify-center text-white shadow-2xl shadow-blue-500/50 active:scale-90 transition-all cursor-pointer ring-8 ring-white">
                                    <i data-lucide="zap" class="w-7 h-7 fill-white"></i>
                                </div>
                            `;
                        }
                        const isActive = state.activeTab === tab.id;
                        return `
                            <button 
                                onclick="${tab.id === 'admin' ? 'setState({isAdmin: true})' : `setState({activeTab: '${tab.id}'})`}" 
                                class="p-2 transition-all flex flex-col items-center gap-1 ${isActive ? 'text-blue-600' : 'text-slate-300'}"
                            >
                                <i data-lucide="${tab.icon}" class="w-6 h-6 ${isActive ? 'fill-current' : ''}"></i>
                                <span class="text-[8px] font-black uppercase tracking-widest">${tab.label}</span>
                            </button>
                        `;
                    }).join('')}
                </nav>
            `;
        }

        function VitalsModal() {
            if (!state.isVitalsModal) return '';
            return `
                <div class="fixed inset-0 z-[1000] flex items-end justify-center bg-slate-900/60 backdrop-blur-sm px-4 pb-10" onclick="setState({isVitalsModal: false})">
                    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl slide-up" onclick="event.stopPropagation()">
                        <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
                        <h2 class="text-2xl font-black text-slate-900 mb-8">${t().vitals}</h2>
                        <div class="grid grid-cols-2 gap-4 mb-8">
                             ${['BP', 'Pulse', 'O2', 'Temp'].map(v => `
                                <div class="p-5 bg-slate-50 rounded-3xl border border-slate-100">
                                    <p class="text-[10px] font-black text-slate-400 uppercase mb-2">${v}</p>
                                    <input type="text" placeholder="--" class="w-full bg-transparent text-xl font-black text-slate-800 placeholder-slate-300 focus:outline-none" />
                                </div>
                             `).join('')}
                        </div>
                        <button onclick="showToast('Vitals Saved Locally'); setState({isVitalsModal: false});" class="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-black uppercase tracking-widest text-xs shadow-xl active:scale-95 transition-all">Save Records</button>
                    </div>
                </div>
            `;
        }

        // --- HANDLERS ---
        function handleNavigation() {
            if (!state.selectedHospital) return;
            showToast(t().notifySent);
            const url = `https://www.google.com/maps/dir/?api=1&destination=${state.selectedHospital.y},${state.selectedHospital.x}`;
            setTimeout(() => { window.open(url, '_blank'); }, 1200);
        }

        function fetchLocation() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const coords = `Lat: ${pos.coords.latitude.toFixed(2)}, Lng: ${pos.coords.longitude.toFixed(2)}`;
                        // Simulating Reverse Geocoding for UI attractiveness
                        const mockAreas = ["Sarita Vihar, New Delhi", "Hauz Khas, New Delhi", "Sector 62, Noida", "Cyber Hub, Gurgaon"];
                        const area = mockAreas[Math.floor(Math.random() * mockAreas.length)];
                        setState({ location: { lat: pos.coords.latitude, lng: pos.coords.longitude, name: area } });
                    },
                    () => setState({ location: { ...state.location, name: "New Delhi, IN (Default)" } })
                );
            }
        }

        // --- RENDERER ---
        function render() {
            const container = document.getElementById('app-container');
            
            if (state.loading) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center bg-slate-950 absolute inset-0">
                        <div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] flex items-center justify-center shadow-2xl shadow-blue-500/40 mb-10 animate-bounce">
                             <i data-lucide="zap" class="text-white w-12 h-12 fill-current"></i>
                        </div>
                        <span class="text-[11px] font-black tracking-[0.6em] text-white uppercase animate-pulse">LIFELINE INDIA</span>
                        <p class="text-[8px] text-slate-500 font-bold mt-2 uppercase tracking-[0.2em]">Synchronizing Area Systems...</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            let viewContent = '';
            if (state.isAdmin) {
                viewContent = `
                    <div class="p-8 bg-slate-950 h-full text-white hide-scrollbar overflow-y-auto pb-32">
                        <div class="flex justify-between items-center mb-12">
                            <h2 class="text-3xl font-black">Staff Admin</h2>
                            <button onclick="setState({isAdmin: false})" class="text-xs font-bold text-slate-500 uppercase tracking-widest">Exit</button>
                        </div>
                        <div class="space-y-6">
                            ${state.hospitals.map(h => `
                                <div class="bg-white/5 border border-white/10 p-6 rounded-[2.5rem]">
                                    <h3 class="text-lg font-black mb-6">${h.name}</h3>
                                    <div class="flex items-center justify-between bg-black/40 p-5 rounded-3xl">
                                        <div>
                                            <p class="text-3xl font-black">${h.beds}</p>
                                            <p class="text-[10px] text-slate-500 uppercase font-black">Beds Open</p>
                                        </div>
                                        <div class="flex gap-2">
                                            <button class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center">-</button>
                                            <button class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center">+</button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                switch(state.activeTab) {
                    case 'home': viewContent = HomeView(); break;
                    case 'map': viewContent = MapView(); break;
                    case 'triage': viewContent = TriageView(); break;
                    case 'meds': viewContent = MedSearchView(); break;
                }
            }

            container.innerHTML = `
                ${Header()}
                <main class="flex-1 flex flex-col overflow-hidden relative">
                    ${viewContent}
                </main>
                ${state.notification ? `
                    <div class="fixed top-24 left-4 right-4 z-[300] animate-in">
                        <div class="bg-slate-900 text-white px-6 py-5 rounded-[2rem] shadow-2xl flex items-center gap-3 border border-white/10">
                            <div class="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center">
                                <i data-lucide="zap" class="w-4 h-4 fill-white"></i>
                            </div>
                            <p class="font-black text-[10px] uppercase tracking-widest">${state.notification}</p>
                        </div>
                    </div>
                ` : ''}
                ${BottomNav()}
                ${VitalsModal()}
                <div class="absolute top-0 w-full h-2 bg-slate-950/10 z-[200] pointer-events-none"></div>
            `;

            lucide.createIcons();
            
            const triageInput = document.getElementById('triage-input');
            if (triageInput && state.searchQuery === '') {
                setTimeout(() => triageInput.focus(), 300);
            }
        }

        // --- INIT ---
        window.onload = () => {
            fetchLocation();
            setTimeout(() => {
                state.loading = false;
                render();
            }, 1800);
        };
    </script>
</body>
</html>
