<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lifeline India - AI Medical Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            touch-action: manipulation;
        }

        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .pulse-ring { animation: ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

        .radar-scan {
            width: 400px;
            height: 400px;
            background: conic-gradient(from 0deg, rgba(37, 99, 235, 0.1), transparent 90deg);
            border-radius: 50%;
            animation: scan 5s linear infinite;
        }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pt-safe { padding-top: max(1rem, var(--safe-top)); }
        .pb-safe { padding-bottom: max(1.5rem, var(--safe-bottom)); }

        .route-path {
            stroke-dasharray: 6;
            animation: dash 30s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: -1000; } }

        .feature-card { transition: all 0.2s ease; }
        .feature-card:active { transform: scale(0.96); opacity: 0.9; }

        .alert-marquee { display: inline-block; white-space: nowrap; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* AI Typing Indicator */
        .typing-dot { width: 4px; height: 4px; background: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen">

    <div id="app-container" class="max-w-md w-full bg-white h-[100dvh] shadow-2xl relative overflow-hidden flex flex-col">
        <!-- Content will be injected -->
    </div>

    <script>
        const apiKey = ""; // Provided by environment

        // --- DATA & STATE ---
        const FIRST_AID_GUIDES = [
            { id: 'cpr', title: 'CPR (Adult)', steps: ['Check surroundings', 'Call 108', 'Push hard in center of chest', 'Allow recoil', '100-120bpm'], color: 'bg-red-500' },
            { id: 'choking', title: 'Choking', steps: ['Stand behind person', '5 back blows', '5 abdominal thrusts', 'Repeat until clear'], color: 'bg-orange-500' },
            { id: 'burns', title: 'Burns', steps: ['Cool water (10 mins)', 'Remove tight items', 'Do not pop blisters', 'Loose bandage'], color: 'bg-yellow-500' }
        ];

        let state = {
            lang: 'en',
            activeTab: 'home',
            location: { lat: 28.6139, lng: 77.2090, name: "Locating device...", isAuto: true },
            hospitals: [
                { id: 'h1', name: "AIIMS - Trauma Center", beds: 4, wait: 12, x: 65, y: 35, specialty: "Cardiology", distance: "1.2 km", traffic: 'Low', blood: { 'O+': 12, 'AB-': 2 }, medicines: { "Aspirin": 150, "Oxygen": 40 } },
                { id: 'h2', name: "Fortis Memorial", beds: 18, wait: 8, x: 25, y: 60, specialty: "Neurology", distance: "4.5 km", traffic: 'Moderate', blood: { 'O+': 5, 'A+': 18 }, medicines: { "Mannitol": 30, "Antibiotics": 200 } },
                { id: 'h3', name: "Apollo Hospitals", beds: 0, wait: 45, x: 80, y: 75, specialty: "Orthopedics", distance: "6.8 km", traffic: 'Heavy', blood: { 'O-': 1, 'B+': 12 }, medicines: { "Morphine": 12, "Insulin": 10 } },
                { id: 'h4', name: "Sir Ganga Ram Hospital", beds: 22, wait: 15, x: 45, y: 45, specialty: "Virology & Infections", distance: "3.1 km", traffic: 'Low', blood: { 'O+': 20, 'A-': 4 }, medicines: { "Paracetamol": 500, "Antivirals": 100 } },
                { id: 'h5', name: "Max Super Specialty", beds: 9, wait: 10, x: 35, y: 25, specialty: "Neurology", distance: "2.4 km", traffic: 'Moderate', blood: { 'B-': 2, 'AB+': 8 }, medicines: { "IV Fluids": 60, "Oxygen": 20 } },
                { id: 'h6', name: "Medanta - The Medicity", beds: 45, wait: 5, x: 15, y: 80, specialty: "Cardiology", distance: "12.0 km", traffic: 'Low', blood: { 'O+': 50, 'O-': 10 }, medicines: { "Aspirin": 300, "Statins": 400 } },
                { id: 'h7', name: "RML Hospital", beds: 5, wait: 55, x: 55, y: 20, specialty: "Viral Care", distance: "5.2 km", traffic: 'Heavy', blood: { 'A+': 3, 'B+': 2 }, medicines: { "Paracetamol": 1000, "Cough Syrup": 200 } },
                { id: 'h8', name: "St. Stephen's Hospital", beds: 12, wait: 20, x: 75, y: 55, specialty: "Pediatrics", distance: "8.1 km", traffic: 'Moderate', blood: { 'O+': 8, 'AB-': 0 }, medicines: { "Pediatric Kits": 50, "IV Fluids": 100 } }
            ],
            searchQuery: '',
            medQuery: '',
            loading: true,
            notification: null,
            isLocationModal: false,
            selectedHospital: null,
            isAiModal: false,
            aiMessages: [{ role: 'ai', text: 'Hello! I am Lifeline AI. How can I help you today? You can ask about symptoms or medicine stocks.' }],
            isAiThinking: false
        };

        // --- CORE FUNCTIONS ---
        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        function showToast(msg) {
            state.notification = msg;
            render();
            setTimeout(() => { state.notification = null; render(); }, 3000);
        }

        async function fetchRealLocation() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&addressdetails=1`);
                        const data = await response.json();
                        const addr = data.address;
                        const label = addr.road || addr.suburb || addr.city || "Current Location";
                        const fullAddr = `${addr.house_number || ''} ${label}, ${addr.city || addr.state || ''}`.trim();
                        setState({ location: { lat: latitude, lng: longitude, name: fullAddr, isAuto: true } });
                    } catch (e) {
                        setState({ location: { lat: latitude, lng: longitude, name: "Coordinates: " + latitude.toFixed(2) + ", " + longitude.toFixed(2), isAuto: true } });
                    }
                }, () => {
                    setState({ location: { ...state.location, name: "GPS Access Denied" } });
                });
            }
        }

        async function askLifelineAI(userText) {
            if (!userText.trim()) return;
            
            const newMessages = [...state.aiMessages, { role: 'user', text: userText }];
            setState({ aiMessages: newMessages, isAiThinking: true });

            const systemPrompt = `You are Lifeline AI, an emergency health assistant in India. 
            App Data:
            - 8 Hospitals: AIIMS, Fortis, Apollo, Ganga Ram, Max, Medanta, RML, St. Stephens.
            - Specialties: Cardiology, Neurology, Virology, Pediatrics.
            - Features: Medicine Finder, Blood Availability, First Aid.
            - Current Location: ${state.location.name}.
            Instruction: Be concise, professional, and empathetic. If it sounds like a critical emergency, tell the user to call 108 immediately. Suggest hospitals from the list above based on their symptoms.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userText }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const result = await response.json();
                const aiResponse = result.candidates?.[0]?.content?.parts?.[0]?.text || "I'm having trouble connecting to my knowledge base. Please try again or call 108 for help.";
                setState({ aiMessages: [...newMessages, { role: 'ai', text: aiResponse }], isAiThinking: false });
            } catch (error) {
                setState({ aiMessages: [...newMessages, { role: 'ai', text: "Error connecting to AI. Please check your internet." }], isAiThinking: false });
            }
        }

        // --- UI VIEWS ---

        function Header() {
            return `
                <div class="bg-white/95 backdrop-blur-xl p-4 pt-safe flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="setState({isLocationModal: true})">
                        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                            <i data-lucide="map-pin" class="text-white w-5 h-5"></i>
                        </div>
                        <div class="overflow-hidden">
                            <div class="flex items-center gap-1">
                                <h1 class="text-[9px] font-black text-blue-600 uppercase tracking-widest leading-none">Live Device Location</h1>
                                <i data-lucide="chevron-down" class="w-2.5 h-2.5 text-slate-400"></i>
                            </div>
                            <p class="text-xs font-black text-slate-900 truncate max-w-[180px] leading-tight mt-0.5">${state.location.name}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <div onclick="setState({isAiModal: true})" class="p-2 bg-blue-50 border border-blue-100 rounded-xl text-blue-600 cursor-pointer active:scale-90 transition-transform">
                             <i data-lucide="bot" class="w-5 h-5"></i>
                        </div>
                    </div>
                </div>
            `;
        }

        function MapView() {
            const hData = state.hospitals;
            const center = { x: 50, y: 50 };
            
            // Generate a simulated complex map background
            let mapLayers = '';
            // Roads
            for(let i=10; i<100; i+=20) {
                mapLayers += `<line x1="${i}" y1="0" x2="${i}" y2="100" stroke="#cbd5e1" stroke-width="0.5" />`;
                mapLayers += `<line x1="0" y1="${i}" x2="100" y2="${i}" stroke="#cbd5e1" stroke-width="0.5" />`;
            }
            // Blocks
            for(let i=0; i<8; i++) {
                const bx = Math.random()*80 + 10;
                const by = Math.random()*80 + 10;
                mapLayers += `<rect x="${bx}" y="${by}" width="10" height="8" rx="1" fill="#e2e8f0" />`;
            }

            let routeMarkup = '';
            if (state.selectedHospital) {
                routeMarkup = `
                    <svg class="absolute inset-0 w-full h-full pointer-events-none z-10" viewBox="0 0 100 100">
                        <path d="M ${center.x} ${center.y} L ${state.selectedHospital.x} ${state.selectedHospital.y}" 
                              fill="none" stroke="#2563eb" stroke-width="1.2" class="route-path" stroke-linecap="round" />
                    </svg>
                `;
            }

            return `
                <div class="flex-1 bg-slate-100 relative overflow-hidden flex flex-col animate-in">
                    <div class="flex-1 relative bg-[#f1f5f9] overflow-hidden">
                        <svg class="absolute inset-0 w-full h-full opacity-40" viewBox="0 0 100 100">${mapLayers}</svg>
                        
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-0">
                             <div class="radar-scan"></div>
                        </div>

                        ${routeMarkup}

                        <!-- Device Marker -->
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30">
                             <div class="w-5 h-5 bg-blue-600 rounded-full border-4 border-white shadow-2xl relative">
                                <div class="absolute inset-0 bg-blue-600 rounded-full pulse-ring"></div>
                             </div>
                             <div class="absolute top-7 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[8px] font-black px-2 py-0.5 rounded whitespace-nowrap shadow-xl">YOU ARE HERE</div>
                        </div>

                        <!-- Hospital Pins -->
                        ${hData.map(h => `
                            <div 
                                onclick="setState({selectedHospital: ${JSON.stringify(h).replace(/"/g, '&quot;')}})"
                                class="absolute cursor-pointer transition-all duration-300 transform -translate-x-1/2 -translate-y-1/2 ${state.selectedHospital?.id === h.id ? 'scale-125 z-40' : 'z-20'}"
                                style="top: ${h.y}%; left: ${h.x}%"
                            >
                                <div class="p-2.5 rounded-2xl shadow-xl ring-4 ring-white ${h.beds > 0 ? 'bg-red-600' : 'bg-slate-400'} text-white">
                                    <i data-lucide="hospital" class="w-4 h-4"></i>
                                </div>
                                ${state.selectedHospital?.id === h.id ? `
                                    <div class="absolute -top-10 left-1/2 -translate-x-1/2 bg-white p-2 rounded-xl shadow-2xl border border-slate-100 whitespace-nowrap">
                                        <p class="text-[9px] font-black text-slate-900 leading-none">${h.name}</p>
                                        <p class="text-[7px] font-bold text-blue-600 uppercase mt-1">${h.distance} • ${h.traffic} traffic</p>
                                    </div>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>

                    ${state.selectedHospital ? `
                        <div class="absolute bottom-28 left-4 right-4 bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 p-8 slide-up z-50">
                            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-6"></div>
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-lg uppercase">${state.selectedHospital.specialty}</span>
                                    <h3 class="text-xl font-black text-slate-900 leading-tight mt-1">${state.selectedHospital.name}</h3>
                                    <p class="text-xs text-slate-400 font-bold mt-1 flex items-center gap-1">
                                        <i data-lucide="navigation" class="w-3.5 h-3.5"></i> Plotting Real Route...
                                    </p>
                                </div>
                                <button onclick="setState({selectedHospital: null})" class="p-2.5 bg-slate-100 rounded-2xl text-slate-400 active:scale-90"><i data-lucide="x" class="w-5 h-5"></i></button>
                            </div>
                            <button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${state.selectedHospital.name}')" class="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black text-sm uppercase tracking-widest shadow-xl shadow-blue-500/30 flex items-center justify-center gap-3 active:scale-95">
                                Start Navigation <i data-lucide="arrow-right-circle" class="w-5 h-5"></i>
                            </button>
                        </div>
                    ` : `
                        <div class="absolute bottom-28 left-8 right-8 p-4 bg-slate-900/90 backdrop-blur-md rounded-3xl text-white text-center animate-in shadow-2xl">
                            <p class="text-[10px] font-black uppercase tracking-[0.4em]">Emergency System Ready</p>
                            <p class="text-[8px] font-bold opacity-60 mt-1 uppercase">Select any hospital to track distance</p>
                        </div>
                    `}
                </div>
            `;
        }

        function AiAgentModal() {
            if (!state.isAiModal) return '';
            return `
                <div class="fixed inset-0 z-[1000] flex items-end justify-center bg-slate-900/40 backdrop-blur-sm px-4 pb-10" onclick="setState({isAiModal: false})">
                    <div class="bg-white w-full max-w-md h-[80vh] rounded-[2.5rem] flex flex-col shadow-2xl slide-up" onclick="event.stopPropagation()">
                        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                                    <i data-lucide="bot" class="text-white w-5 h-5"></i>
                                </div>
                                <div>
                                    <h2 class="text-lg font-black text-slate-900 leading-none">Lifeline AI</h2>
                                    <p class="text-[10px] font-bold text-green-500 uppercase mt-1">Agent Online</p>
                                </div>
                            </div>
                            <button onclick="setState({isAiModal: false})" class="p-2 bg-slate-50 rounded-xl text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        
                        <div id="ai-chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 hide-scrollbar bg-slate-50/50">
                            ${state.aiMessages.map(m => `
                                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                                    <div class="max-w-[85%] p-4 rounded-3xl ${m.role === 'user' ? 'bg-blue-600 text-white rounded-br-none shadow-lg' : 'bg-white text-slate-700 border border-slate-100 rounded-bl-none shadow-sm'}">
                                        <p class="text-sm font-medium leading-relaxed">${m.text}</p>
                                    </div>
                                </div>
                            `).join('')}
                            ${state.isAiThinking ? `
                                <div class="flex justify-start">
                                    <div class="bg-white p-4 rounded-3xl rounded-bl-none flex gap-1 items-center">
                                        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                                    </div>
                                </div>
                            ` : ''}
                        </div>

                        <div class="p-6 bg-white border-t border-slate-100">
                            <form onsubmit="event.preventDefault(); const inp = this.querySelector('input'); askLifelineAI(inp.value); inp.value='';" class="relative">
                                <input 
                                    type="text" 
                                    placeholder="Ask about symptoms or medicines..."
                                    class="w-full pl-6 pr-14 py-5 rounded-[2rem] bg-slate-50 text-sm font-bold border-none focus:ring-4 focus:ring-blue-500/10 transition-all outline-none"
                                />
                                <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg">
                                    <i data-lucide="send" class="w-4 h-4"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- THE HOME DASHBOARD --- (Combining image-style features)
        function HomeView() {
            return `
                <div class="p-5 space-y-6 pb-32 animate-in overflow-y-auto flex-1 hide-scrollbar">
                    <!-- Health Marquee -->
                    <div class="bg-blue-50 border border-blue-100 rounded-2xl p-3 overflow-hidden">
                        <div class="alert-marquee flex gap-10 items-center">
                            <p class="text-[10px] font-black text-blue-700 uppercase flex items-center gap-2">
                                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                                System Live: AI Symptom Matching active in ${state.location.name}.
                            </p>
                        </div>
                    </div>

                    <!-- 4-Grid Feature Cards (The requested UI) -->
                    <div class="grid grid-cols-2 gap-4">
                        <div onclick="setState({activeTab: 'triage'})" class="feature-card p-6 bg-red-50/80 border border-red-100 rounded-[2.5rem] flex flex-col items-start cursor-pointer shadow-sm">
                            <div class="w-12 h-12 bg-red-500 rounded-full flex items-center justify-center text-white mb-6 shadow-xl shadow-red-500/20">
                                <i data-lucide="activity" class="w-6 h-6"></i>
                            </div>
                            <h3 class="font-black text-slate-800 text-base mb-1">Symptom Triage</h3>
                            <p class="text-xs text-slate-400 font-medium">Symptom matching</p>
                        </div>
                        <div onclick="setState({activeTab: 'meds'})" class="feature-card p-6 bg-blue-50/80 border border-blue-100 rounded-[2.5rem] flex flex-col items-start cursor-pointer shadow-sm">
                            <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white mb-6 shadow-xl shadow-blue-500/20">
                                <i data-lucide="package" class="w-6 h-6"></i>
                            </div>
                            <h3 class="font-black text-slate-800 text-base mb-1">Medicine Finder</h3>
                            <p class="text-xs text-slate-400 font-medium">Stock availability</p>
                        </div>
                        <div onclick="setState({activeTab: 'blood'})" class="feature-card p-6 bg-orange-50/80 border border-orange-100 rounded-[2.5rem] flex flex-col items-start cursor-pointer shadow-sm">
                            <div class="w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center text-white mb-6 shadow-xl shadow-orange-500/20">
                                <i data-lucide="droplet" class="w-6 h-6"></i>
                            </div>
                            <h3 class="font-black text-slate-800 text-base mb-1">Blood Availability</h3>
                            <p class="text-xs text-slate-400 font-medium">Real-time units</p>
                        </div>
                        <div onclick="setState({activeTab: 'firstaid'})" class="feature-card p-6 bg-teal-50/80 border border-teal-100 rounded-[2.5rem] flex flex-col items-start cursor-pointer shadow-sm">
                            <div class="w-12 h-12 bg-teal-500 rounded-full flex items-center justify-center text-white mb-6 shadow-xl shadow-teal-500/20">
                                <i data-lucide="info" class="w-6 h-6"></i>
                            </div>
                            <h3 class="font-black text-slate-800 text-base mb-1">First Aid Guide</h3>
                            <p class="text-xs text-slate-400 font-medium">Emergency steps</p>
                        </div>
                    </div>

                    <!-- Lifeline AI Banner -->
                    <div onclick="setState({isAiModal: true})" class="bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-xl shadow-blue-500/30 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-blue-600 rounded-[1.8rem] flex items-center justify-center shadow-lg">
                                <i data-lucide="bot" class="w-7 h-7"></i>
                            </div>
                            <div>
                                <h4 class="text-sm font-black uppercase tracking-tight">AI Health Assistant</h4>
                                <p class="text-[9px] text-blue-400 font-bold uppercase mt-1 flex items-center gap-1">
                                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Ask anything now
                                </p>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="w-5 h-5 opacity-40"></i>
                    </div>

                    <!-- Emergency Contact List -->
                    <div class="bg-red-600 p-6 rounded-[2.5rem] text-white flex justify-between items-center shadow-xl shadow-red-500/30">
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Instant Emergency SOS</p>
                            <h3 class="text-2xl font-black italic tracking-tighter uppercase leading-none">Call 108</h3>
                            <p class="text-[9px] font-bold mt-2 text-red-100 uppercase">Paramedics are on standby</p>
                        </div>
                        <a href="tel:108" class="w-16 h-16 bg-white rounded-[1.8rem] flex items-center justify-center text-red-600 shadow-xl active:scale-90 transition-transform">
                            <i data-lucide="phone" class="w-8 h-8 fill-current"></i>
                        </a>
                    </div>
                </div>
            `;
        }

        function BottomNav() {
            const tabs = [{ id: 'home', icon: 'home' }, { id: 'map', icon: 'navigation-2' }, { id: 'triage', icon: 'zap', central: true }, { id: 'blood', icon: 'droplet' }, { id: 'firstaid', icon: 'info' }];
            return `
                <nav class="fixed bottom-0 max-w-md w-full bg-white/95 backdrop-blur-2xl border-t border-slate-100 flex justify-around items-center p-4 pb-safe z-[200]">
                    ${tabs.map(tab => {
                        if (tab.central) return `<div onclick="setState({activeTab: 'triage'})" class="w-16 h-16 -mt-12 bg-blue-600 rounded-[2rem] flex items-center justify-center text-white shadow-2xl shadow-blue-500/50 ring-8 ring-white cursor-pointer active:scale-90 transition-transform"><i data-lucide="zap" class="w-7 h-7 fill-white"></i></div>`;
                        const isActive = state.activeTab === tab.id;
                        return `<button onclick="setState({activeTab: '${tab.id}'})" class="p-2.5 transition-all flex flex-col items-center gap-1 ${isActive ? 'text-blue-600' : 'text-slate-300'}"><i data-lucide="${tab.icon}" class="w-6 h-6 ${isActive ? 'fill-current' : ''}"></i></button>`;
                    }).join('')}
                </nav>
            `;
        }

        // --- OTHER VIEWS (REUSED) ---
        function TriageView() {
            return `<div class="p-10 text-center py-20 animate-in">
                <i data-lucide="zap" class="w-12 h-12 text-blue-600 mx-auto mb-4"></i>
                <h2 class="text-xl font-black text-slate-900">AI Triage Active</h2>
                <p class="text-sm text-slate-400 mt-2">The system is currently scanning ${state.hospitals.length} hospitals for your symptoms.</p>
                <button onclick="setState({isAiModal: true})" class="mt-8 px-8 py-4 bg-slate-900 text-white rounded-[1.5rem] font-black text-xs uppercase tracking-widest">Ask Lifeline AI</button>
            </div>`;
        }

        function render() {
            const container = document.getElementById('app-container');
            if (state.loading) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center bg-slate-950 absolute inset-0"><div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] flex items-center justify-center shadow-2xl mb-10 animate-bounce"><i data-lucide="zap" class="text-white w-12 h-12 fill-current"></i></div><span class="text-[11px] font-black tracking-[0.6em] text-white uppercase animate-pulse">LIFELINE INDIA</span></div>`;
                lucide.createIcons();
                return;
            }

            let content = '';
            switch(state.activeTab) {
                case 'home': content = HomeView(); break;
                case 'map': content = MapView(); break;
                case 'triage': content = TriageView(); break;
                case 'blood': content = `<div class="p-10 text-center py-20">Blood Bank View (Syncing...)</div>`; break;
                case 'firstaid': content = `<div class="p-10 text-center py-20">First Aid Guide (Syncing...)</div>`; break;
            }

            container.innerHTML = `${Header()} <main class="flex-1 flex flex-col overflow-hidden relative">${content}</main> ${BottomNav()} ${AiAgentModal()}`;
            lucide.createIcons();
            if (state.isAiModal) {
                const chatBox = document.getElementById('ai-chat-box');
                if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        window.onload = () => {
            fetchRealLocation();
            setTimeout(() => { state.loading = false; render(); }, 1500);
        };
    </script>
</body>
</html>
