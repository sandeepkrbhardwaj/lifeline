<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lifeline India | AI Medical Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            touch-action: manipulation;
        }

        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .pulse-ring { animation: ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

        .radar-scan {
            width: 500px;
            height: 500px;
            background: conic-gradient(from 0deg, rgba(37, 99, 235, 0.15), transparent 90deg);
            border-radius: 50%;
            animation: scan 6s linear infinite;
        }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pt-safe { padding-top: max(1rem, var(--safe-top)); }
        .pb-safe { padding-bottom: max(1.5rem, var(--safe-bottom)); }

        .route-path {
            stroke-dasharray: 8;
            animation: dash 25s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: -1000; } }

        .feature-card { transition: all 0.2s ease; cursor: pointer; }
        .feature-card:active { transform: scale(0.96); opacity: 0.9; }

        /* Mobile FAB for AI */
        .fab-btn {
            position: fixed;
            bottom: calc(100px + var(--safe-bottom));
            right: 20px;
            z-index: 500;
        }

        .typing-dot { width: 4px; height: 4px; background: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        #app-container {
            width: 100%;
            height: 100dvh;
        }

        @media (min-width: 640px) {
            #app-container {
                max-width: 28rem; /* max-w-md */
            }
        }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen">

        <!-- Application Engine -->
    </div>

    <script>

        // --- TRANSLATIONS ---

                bloodBank: "ब्लड बैंक",
                inventoryNear: "आपके पास उपलब्ध रक्त",
                availCheck: "अस्पताल की उपलब्धता जांचें",
                emergencyAid: "आपातकालीन सहायता",
                stepsFollow: "मदद आने तक इनका पालन करें",
                aiGreet: "नमस्ते! मैं लाइफलाइन AI हूँ। मैं आपके क्षेत्र के अस्पतालों, बेड और दवाइयों की जानकारी दे सकता हूँ। मैं आपकी क्या मदद करूँ?",
                aiTitle: "लाइफलाइन AI",
                aiSub: "क्लिनिकल असिस्टेंट",
                aiPlaceholder: "लक्षण बताएं (जैसे सीने में दर्द)...",
                navTitle: "अस्पताल विवरण",
                openMaps: "गूगल मैप्स खोलें",
                noCenters: "पास में कोई अस्पताल नहीं मिला"
            }
        };

        const FIRST_AID_GUIDES = {
            en: [
                { id: 'cpr', title: 'CPR (Adult)', steps: ['Check scene safety', 'Call 108/Emergency', 'Push hard & fast in center of chest', 'Allow full chest recoil', 'Give rescue breaths'], color: 'bg-red-500', icon: 'heart-pulse' },
                { id: 'choking', title: 'Choking / Heimlich', steps: ['Stand behind the person', 'Give 5 back blows', 'Give 5 abdominal thrusts', 'Repeat until object is out'], color: 'bg-orange-500', icon: 'wind' }
            ],
            hi: [
                { id: 'cpr', title: 'CPR (वयस्क)', steps: ['जगह की सुरक्षा जांचें', '108 कॉल करें', 'छाती के बीच में जोर से दबाएं', 'छाती को वापस आने दें', 'सांस दें'], color: 'bg-red-500', icon: 'heart-pulse' },
                { id: 'choking', title: 'दम घुटना (Heimlich)', steps: ['व्यक्ति के पीछे खड़े हों', 'पीठ पर 5 बार थपथपाएं', 'पेट पर 5 बार दबाव दें', 'वस्तु बाहर आने तक दोहराएं'], color: 'bg-orange-500', icon: 'wind' }
            ]
        };

        let state = {
            loading: true,
            activeTab: 'home',
            lang: 'en',
            location: { lat: 28.6139, lng: 77.2090, name: "Default (New Delhi)", granted: false },
            hospitals: [],
            searchQuery: '',
            isAiModal: false,
            aiMessages: [],
            isAiThinking: false,
            notification: null,
            selectedHospital: null
        };

        // --- CORE FUNCTIONS ---

        function t() { return TRANSLATIONS[state.lang]; }

        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        function showToast(msg) {
            state.notification = msg; render();
            setTimeout(() => { state.notification = null; render(); }, 3000);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function initApp() {
            state.aiMessages = [{ role: 'ai', text: t().aiGreet }];
            
            const fallbackTimer = setTimeout(() => {
                if (state.loading) {
                    setState({ loading: false });
                }
            }, 8000);

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    try {
                        const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18`);
                        const geoData = await geoRes.json();
                        const addr = geoData.display_name ? geoData.display_name.split(',').slice(0, 3).join(', ') : "Current Location";

                        const osmQuery = `[out:json];node["amenity"="hospital"](around:15000,${latitude},${longitude});out body;`;
                        const hospitalRes = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(osmQuery)}`);
                        const hData = await hospitalRes.json();

                        const specs = ["Cardiology", "Neurology", "Orthopedic", "General Medicine", "Pediatrics", "Trauma Care"];

                        const processedHospitals = hData.elements.map(h => {
                            const dist = calculateDistance(latitude, longitude, h.lat, h.lon);
                            return {
                                id: h.id,
                                name: h.tags.name || "Emergency Medical Center",
                                lat: h.lat, lng: h.lon,
                                distance: dist,
                                beds: Math.floor(Math.random() * 40) + 2,
                                wait: Math.floor(Math.random() * 50) + 5,
                                cost: Math.floor(Math.random() * 500) + 300,
                                specialty: specs[Math.floor(Math.random() * specs.length)],
                                blood: { 'O+': Math.floor(Math.random()*15), 'AB-': Math.floor(Math.random()*3), 'B+': 10 },
                                medicines: { "Oxygen": 15, "Aspirin": 120, "Insulin": 20 }
                            };
                        }).sort((a, b) => a.distance - b.distance);

                        clearTimeout(fallbackTimer);
                        setState({ 
                            location: { lat: latitude, lng: longitude, name: addr, granted: true },
                            hospitals: processedHospitals,
                            loading: false 
                        });
                    } catch (e) {
                        clearTimeout(fallbackTimer);
                        setState({ loading: false });
                    }
                }, () => {
                    clearTimeout(fallbackTimer);
                    setState({ loading: false });
                }, { timeout: 8000 });
            } else {
                clearTimeout(fallbackTimer);
                setState({ loading: false });
            }
        }

        async function askAI(text) {
            if (!text.trim()) return;
            const msgs = [...state.aiMessages, { role: 'user', text }];
            setState({ aiMessages: msgs, isAiThinking: true });

            const sysPrompt = `You are Lifeline AI. Location: ${state.location.name}. Hospitals: ${state.hospitals.slice(0,3).map(h=>h.name).join(', ')}. Language: ${state.lang === 'hi' ? 'Hindi' : 'English'}. Be fast and concise.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text }] }], systemInstruction: { parts: [{ text: sysPrompt }] } })
                });
                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Call 108 for emergencies.";
                setState({ aiMessages: [...msgs, { role: 'ai', text: aiText }], isAiThinking: false });
            } catch (e) {
                setState({ aiMessages: [...msgs, { role: 'ai', text: "Error. Try again." }], isAiThinking: false });
            }
        }

        function handleNavigation(h) {
            const hospital = h || state.selectedHospital;
            if (!hospital) return;
            const url = `https://www.google.com/maps/dir/?api=1&destination=${hospital.lat},${hospital.lng}&travelmode=driving`;
            window.open(url, '_blank');
        }

        // --- UI VIEWS ---

        function Header() {

                            <i data-lucide="zap" class="text-white fill-white w-5 h-5"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h1 class="text-[9px] font-black text-blue-600 uppercase tracking-widest leading-none">${t().gridTitle}</h1>

                        <button onclick="setState({lang: state.lang === 'en' ? 'hi' : 'en'})" class="px-3 py-1.5 bg-slate-900 rounded-xl text-[10px] font-black text-white active:scale-95 transition-transform">
                            ${state.lang === 'en' ? 'हिन्दी' : 'EN'}
                        </button>
                        <button onclick="location.reload()" class="p-2 bg-slate-50 border border-slate-100 rounded-xl text-slate-400 active:rotate-180 transition-all">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function HomeView() {
            const query = state.searchQuery.toLowerCase();
            const filtered = state.hospitals.filter(h => {
                if (!query) return true;
                
                // Direct name/specialty match
                if (h.name.toLowerCase().includes(query) || h.specialty.toLowerCase().includes(query)) return true;

                // Smart Symptom Mapping
                const heartKeywords = ['heart', 'chest pain', 'failure', 'cardiac', 'dil'];
                const feverKeywords = ['fever', 'flu', 'viral', 'bukhaar', 'thandi', 'infection'];
                const orthoKeywords = ['bone', 'fracture', 'ortho', 'haddi', 'accident', 'injury'];
                const brainKeywords = ['brain', 'stroke', 'headache', 'neuro'];

                if (heartKeywords.some(k => query.includes(k)) && h.specialty.toLowerCase().includes('cardio')) return true;
                if (feverKeywords.some(k => query.includes(k)) && (h.specialty.toLowerCase().includes('medicine') || h.specialty.toLowerCase().includes('general'))) return true;
                if (orthoKeywords.some(k => query.includes(k)) && h.specialty.toLowerCase().includes('ortho')) return true;
                if (brainKeywords.some(k => query.includes(k)) && h.specialty.toLowerCase().includes('neuro')) return true;

                return false;
            });

            return `
                <div class="p-4 space-y-6 pb-32 animate-in overflow-y-auto flex-1 hide-scrollbar">
                    
                    <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-50">
                        <h2 class="text-lg font-black text-slate-900 mb-4 tracking-tight">${t().searchTitle}</h2>
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                            <input 
                                type="text" 
                                placeholder="${t().searchPlaceholder}" 
                                class="w-full pl-14 pr-5 py-5 bg-slate-50 rounded-[2rem] font-bold text-sm focus:outline-none border-none placeholder-slate-300"
                                value="${state.searchQuery}"
                                oninput="setState({searchQuery: this.value})"
                            />
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div onclick="setState({activeTab: 'blood'})" class="feature-card p-6 bg-orange-50 border border-orange-100 rounded-[2.5rem] shadow-sm">
                            <div class="w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center text-white mb-6 shadow-xl shadow-orange-500/20">
                                <i data-lucide="droplet" class="w-6 h-6"></i>
                            </div>
                            <h3 class="font-black text-slate-800 text-base mb-1">${t().bloodUnits}</h3>
                            <p class="text-xs text-slate-400 font-medium">${t().realTimeStocks}</p>
                        </div>
                        <div onclick="setState({activeTab: 'firstaid'})" class="feature-card p-6 bg-teal-50 border border-teal-100 rounded-[2.5rem] shadow-sm">
                            <div class="w-12 h-12 bg-teal-500 rounded-full flex items-center justify-center text-white mb-6 shadow-xl shadow-teal-500/20">
                                <i data-lucide="info" class="w-6 h-6"></i>
                            </div>
                            <h3 class="font-black text-slate-800 text-base mb-1">${t().firstAid}</h3>
                            <p class="text-xs text-slate-400 font-medium">${t().emergencyGuides}</p>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="flex justify-between items-center px-1">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${t().matchedCenters}</h3>
                            <span class="text-[10px] font-bold text-blue-600">${filtered.length} ${t().centersFound}</span>
                        </div>

                        ${filtered.length > 0 ? filtered.map(h => `
                            <div onclick="setState({selectedHospital: ${JSON.stringify(h).replace(/"/g, '&quot;')}, activeTab: 'map'})" class="bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col gap-4 active:scale-95 transition-all cursor-pointer">
                                <div class="flex justify-between items-start">
                                    <div class="flex items-center gap-3">
                                        <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center">
                                            <i data-lucide="hospital" class="w-6 h-6"></i>
                                        </div>
                                        <div class="max-w-[140px]">
                                            <h4 class="font-black text-slate-900 text-sm tracking-tight truncate">${h.name}</h4>
                                            <p class="text-[9px] font-bold text-blue-500 uppercase">${h.distance.toFixed(2)} km • ${h.specialty}</p>
                                        </div>
                                    </div>
                                    <div class="flex flex-col items-end gap-2">
                                        <a href="tel:108" onclick="event.stopPropagation()" class="p-2.5 bg-red-50 text-red-600 rounded-xl border border-red-100 active:scale-90 transition-transform">
                                            <i data-lucide="phone" class="w-4 h-4"></i>
                                        </a>
                                        <div class="text-right">
                                            <p class="text-xs font-black text-green-600">₹${h.cost}</p>
                                            <p class="text-[8px] font-bold text-slate-400 uppercase">${t().consultation}</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex gap-2 border-t border-slate-50 pt-3">
                                    <span class="text-[8px] font-black text-slate-500 bg-slate-100 px-2 py-1 rounded-lg uppercase">${h.beds} ${t().beds}</span>
                                    <span class="text-[8px] font-black text-orange-500 bg-orange-50 px-2 py-1 rounded-lg uppercase">${h.wait}m ${t().wait}</span>
                                    <span class="text-[8px] font-black text-teal-600 bg-teal-50 px-2 py-1 rounded-lg uppercase">${t().specialistLive}</span>
                                </div>
                            </div>
                        `).join('') : `
                            <div class="py-12 text-center opacity-30">
                                <i data-lucide="search-x" class="mx-auto w-12 h-12 mb-2"></i>
                                <p class="text-xs font-black uppercase">${t().noCenters}</p>
                            </div>
                        `}
                    </div>

                    <div class="bg-red-600 p-6 rounded-[2.5rem] text-white flex justify-between items-center shadow-xl shadow-red-500/30">
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">${t().panicSOS}</p>
                            <h3 class="text-2xl font-black italic tracking-tighter uppercase leading-none">${t().call108}</h3>
                            <p class="text-[9px] font-bold mt-2 text-red-100 uppercase">${t().standby}</p>
                        </div>
                        <a href="tel:108" class="w-16 h-16 bg-white rounded-[1.8rem] flex items-center justify-center text-red-600 shadow-xl active:scale-90 transition-transform">
                            <i data-lucide="phone" class="w-8 h-8 fill-current"></i>
                        </a>
                    </div>
                </div>
            `;
        }

        function MapView() {
            const center = { x: 50, y: 50 };
            let route = '';
            if (state.selectedHospital) {
                const hx = 50 + (state.selectedHospital.lng - state.location.lng) * 5000;
                const hy = 50 + (state.location.lat - state.selectedHospital.lat) * 5000;
                route = `<path d="M ${center.x} ${center.y} L ${hx} ${hy}" fill="none" stroke="#2563eb" stroke-width="1.2" class="route-path" stroke-linecap="round" />`;
            }

            return `
                <div class="flex-1 bg-slate-100 relative overflow-hidden flex flex-col animate-in">
                    <div class="flex-1 relative bg-[#f8fafc] overflow-hidden">
                        <svg class="absolute inset-0 w-full h-full opacity-40" viewBox="0 0 100 100">${route}</svg>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
                             <div class="radar-scan"></div>
                        </div>
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30">
                             <div class="w-6 h-6 bg-blue-600 rounded-full border-4 border-white shadow-2xl relative">
                                <div class="absolute inset-0 bg-blue-600 rounded-full pulse-ring"></div>
                             </div>
                        </div>
                        ${state.hospitals.slice(0, 15).map(h => {
                            const hx = 50 + (h.lng - state.location.lng) * 5000;
                            const hy = 50 + (state.location.lat - h.lat) * 5000;
                            if (hx < -10 || hx > 110 || hy < -10 || hy > 110) return '';
                            return `
                                <div onclick="setState({selectedHospital: ${JSON.stringify(h).replace(/"/g, '&quot;')}})" 
                                     class="absolute transition-all duration-300 transform -translate-x-1/2 -translate-y-1/2 ${state.selectedHospital?.id === h.id ? 'scale-125 z-40' : 'z-20'}" 
                                     style="top: ${hy}%; left: ${hx}%">
                                    <div class="p-2.5 rounded-2xl shadow-xl ring-4 ring-white ${h.beds > 0 ? 'bg-red-600' : 'bg-slate-400'} text-white">
                                        <i data-lucide="hospital" class="w-4 h-4"></i>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    ${state.selectedHospital ? `
                        <div class="absolute bottom-28 left-4 right-4 bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-8 slide-up z-50">
                            <div class="w-12 h-1 bg-slate-100 rounded-full mx-auto mb-6"></div>
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-lg uppercase">${t().navTitle}</span>
                                    <h3 class="text-lg font-black text-slate-900 leading-tight mt-1 truncate max-w-[180px]">${state.selectedHospital.name}</h3>
                                    <p class="text-xs text-slate-400 font-bold mt-1">Driving: ${state.selectedHospital.distance.toFixed(2)} km</p>
                                </div>
                                <button onclick="setState({selectedHospital: null})" class="p-2.5 bg-slate-50 rounded-2xl text-slate-400 active:scale-90"><i data-lucide="x" class="w-5 h-5"></i></button>
                            </div>
                            <button onclick="handleNavigation()" class="w-full py-5 bg-blue-600 text-white rounded-[1.5rem] font-black text-sm uppercase tracking-widest shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                                ${t().openMaps} <i data-lucide="arrow-up-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function BloodBankView() {
            return `
                <div class="p-4 pb-32 animate-in flex-1 overflow-y-auto hide-scrollbar space-y-4">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-xl">
                        <div class="flex items-center gap-4 mb-2">
                            <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center text-white"><i data-lucide="droplet" class="w-6 h-6"></i></div>
                            <h2 class="text-2xl font-black text-slate-900">${t().bloodBank}</h2>
                        </div>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">${t().inventoryNear}</p>
                    </div>

                    <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex items-center justify-between">
                        <p class="text-[11px] font-black text-blue-600 uppercase tracking-wider">${t().availCheck}</p>
                        <i data-lucide="phone-forwarded" class="w-4 h-4 text-blue-400"></i>
                    </div>

                    ${state.hospitals.map(h => `
                        <div onclick="setState({selectedHospital: ${JSON.stringify(h).replace(/"/g, '&quot;')}, activeTab: 'map'})" class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm cursor-pointer active:bg-slate-50 transition-colors">
                            <div class="flex justify-between items-center mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-slate-100 text-slate-400 rounded-xl flex items-center justify-center">
                                        <i data-lucide="navigation" class="w-5 h-5"></i>
                                    </div>
                                    <h4 class="font-black text-slate-800 text-sm truncate max-w-[140px]">${h.name}</h4>
                                </div>
                                <a href="tel:108" onclick="event.stopPropagation()" class="p-2.5 bg-red-50 text-red-600 rounded-xl active:scale-90 transition-transform">
                                    <i data-lucide="phone" class="w-4 h-4"></i>
                                </a>
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                ${Object.entries(h.blood).map(([t, q]) => `
                                    <div class="p-3 bg-slate-50 rounded-2xl text-center border border-slate-100">
                                        <p class="text-xs font-black text-slate-800">${t}</p>
                                        <p class="text-[10px] font-bold ${q > 0 ? 'text-green-600' : 'text-red-500'}">${q}u</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function FirstAidView() {
            const guides = FIRST_AID_GUIDES[state.lang];
            return `
                <div class="p-4 pb-32 animate-in flex-1 overflow-y-auto hide-scrollbar space-y-4">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-xl">
                        <div class="flex items-center gap-4 mb-2">
                            <div class="w-12 h-12 bg-teal-500 rounded-2xl flex items-center justify-center text-white"><i data-lucide="info" class="w-6 h-6"></i></div>
                            <h2 class="text-2xl font-black text-slate-900">${t().emergencyAid}</h2>
                        </div>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">${t().stepsFollow}</p>
                    </div>
                    ${guides.map(g => `
                        <div class="bg-white p-7 rounded-[2rem] border border-slate-100 shadow-sm">
                            <div class="flex items-center gap-4 mb-4">
                                <div class="w-12 h-12 ${g.color} text-white rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="${g.icon}" class="w-6 h-6"></i></div>
                                <h3 class="text-lg font-black text-slate-800">${g.title}</h3>
                            </div>
                            <div class="space-y-3">
                                ${g.steps.map((s, i) => `<div class="flex gap-4 items-start"><span class="w-6 h-6 bg-slate-50 rounded-full flex items-center justify-center text-[10px] font-black shrink-0 border border-slate-100">${i+1}</span><p class="text-xs font-medium text-slate-600 leading-relaxed">${s}</p></div>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function AiAgentModal() {
            if (!state.isAiModal) return '';
            return `
                <div class="fixed inset-0 z-[1000] flex items-end justify-center bg-slate-900/40 backdrop-blur-sm px-4 pb-10 animate-in" onclick="setState({isAiModal: false})">
                    <div class="bg-white w-full max-w-md h-[85vh] rounded-[2.5rem] flex flex-col shadow-2xl overflow-hidden slide-up" onclick="event.stopPropagation()">
                        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="bot" class="text-white w-5 h-5"></i></div>
                                <div><h2 class="text-lg font-black text-slate-900 leading-none">${t().aiTitle}</h2><p class="text-[10px] font-bold text-green-500 uppercase mt-1">${t().aiSub}</p></div>
                            </div>
                            <button onclick="setState({isAiModal: false})" class="p-2 bg-slate-50 rounded-xl text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <div id="ai-chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 hide-scrollbar">
                            ${state.aiMessages.map(m => `<div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}"><div class="max-w-[85%] p-4 rounded-3xl ${m.role === 'user' ? 'bg-blue-600 text-white rounded-br-none shadow-lg' : 'bg-white text-slate-700 border border-slate-100 rounded-bl-none shadow-sm'}"><p class="text-sm font-medium leading-relaxed">${m.text}</p></div></div>`).join('')}
                            ${state.isAiThinking ? `<div class="flex justify-start"><div class="bg-white p-4 rounded-3xl flex gap-1 items-center shadow-sm"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>` : ''}
                        </div>
                        <div class="p-6 bg-white border-t border-slate-100 pb-safe">
                            <form onsubmit="event.preventDefault(); const inp = this.querySelector('input'); askAI(inp.value); inp.value='';" class="relative">
                                <input type="text" placeholder="${t().aiPlaceholder}" class="w-full pl-6 pr-14 py-5 rounded-[2rem] bg-slate-100 text-sm font-bold border-none outline-none focus:ring-2 focus:ring-blue-500/20" />
                                <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all"><i data-lucide="send" class="w-4 h-4"></i></button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
        }

        function BottomNav() {
            const tabs = [{ id: 'home', icon: 'home' }, { id: 'map', icon: 'map' }, { id: 'triage', icon: 'zap', central: true }, { id: 'blood', icon: 'droplet' }, { id: 'firstaid', icon: 'info' }];
            return `
                <nav class="fixed bottom-0 max-w-md w-full bg-white/95 backdrop-blur-2xl border-t border-slate-100 flex justify-around items-center p-4 pb-safe z-[200]">
                    ${tabs.map(tab => {
                        if (tab.central) return `<div onclick="setState({activeTab: 'home'})" class="w-16 h-16 -mt-12 bg-blue-600 rounded-[2rem] flex items-center justify-center text-white shadow-2xl ring-8 ring-white cursor-pointer active:scale-90 transition-transform"><i data-lucide="zap" class="w-7 h-7 fill-white"></i></div>`;
                        const isActive = state.activeTab === tab.id;
                        return `<button onclick="setState({activeTab: '${tab.id}'})" class="p-3 transition-all flex flex-col items-center gap-1 ${isActive ? 'text-blue-600 scale-110' : 'text-slate-300 active:scale-90'}"><i data-lucide="${tab.icon}" class="w-6 h-6 ${isActive ? 'fill-current' : ''}"></i></button>`;
                    }).join('')}
                </nav>
            `;
        }

        // --- RENDER ENGINE ---

        function render() {
            const container = document.getElementById('app-container');
            
            if (typeof lucide === 'undefined') {
                container.innerHTML = `<div class="p-10 text-center">Script loading error. Please check your internet connection.</div>`;
                return;
            }

            if (state.loading) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center bg-slate-950 absolute inset-0 z-[1000]"><div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] flex items-center justify-center shadow-2xl mb-10 animate-bounce"><i data-lucide="zap" class="text-white w-12 h-12 fill-current"></i></div><span class="text-[11px] font-black tracking-[0.6em] text-white uppercase animate-pulse">LIFELINE INDIA</span><p class="text-[8px] font-bold text-blue-500 uppercase mt-2">Connecting Real-Time Medical Grid...</p></div>`;
                lucide.createIcons(); return;
            }

            let content = '';
            switch(state.activeTab) {
                case 'home': content = HomeView(); break;
                case 'map': content = MapView(); break;
                case 'blood': content = BloodBankView(); break;
                case 'firstaid': content = FirstAidView(); break;
            }

            container.innerHTML = `
                ${Header()}
                <main class="flex-1 flex flex-col overflow-hidden relative bg-[#f8fafc]">${content}</main>
                ${BottomNav()}
                <button onclick="setState({isAiModal: true})" class="fab-btn w-16 h-16 bg-slate-900 text-white rounded-[2rem] flex items-center justify-center shadow-2xl active:scale-90 transition-transform ring-4 ring-white/5">
                    <i data-lucide="bot" class="w-8 h-8"></i>
                </button>
                ${AiAgentModal()}
                ${state.notification ? `<div class="fixed top-24 left-4 right-4 z-[300] animate-in bg-slate-900 text-white p-4 rounded-2xl font-black text-[10px] text-center uppercase tracking-widest shadow-2xl">${state.notification}</div>` : ''}
            `;
            lucide.createIcons();
            const cb = document.getElementById('ai-chat-box'); if(cb) cb.scrollTop = cb.scrollHeight;
        }

        window.addEventListener('load', () => {
            initApp();
            setTimeout(() => { if (state.loading) setState({ loading: false }); }, 10000);
        });
    </script>
</body>
</html>
