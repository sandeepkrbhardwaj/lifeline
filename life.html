<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lifeline India - Seconds Matter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            touch-action: manipulation;
        }

        .animate-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .pulse-ring {
            animation: ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .radar-scan {
            width: 300px;
            height: 300px;
            background: conic-gradient(from 0deg, rgba(37, 99, 235, 0.15), transparent 90deg);
            border-radius: 50%;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pt-safe { padding-top: max(1rem, var(--safe-top)); }
        .pb-safe { padding-bottom: max(1.5rem, var(--safe-bottom)); }

        .route-path {
            stroke-dasharray: 8;
            animation: dash 20s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -1000; }
        }

        .feature-card {
            transition: all 0.2s ease;
        }
        .feature-card:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen">

    <div id="app-container" class="max-w-md w-full bg-white h-[100dvh] shadow-2xl relative overflow-hidden flex flex-col">
        <!-- JS will inject content here -->
    </div>

    <script>
        // --- DATA & STATE ---
        const FIRST_AID_GUIDES = [
            { id: 'cpr', title: 'CPR (Adult)', steps: ['Check surroundings', 'Call 108', 'Push hard & fast in center of chest', 'Allow chest recoil', 'Repeat 100-120bpm'], color: 'bg-red-500' },
            { id: 'choking', title: 'Choking', steps: ['Stand behind person', 'Give 5 back blows', 'Give 5 abdominal thrusts (Heimlich)', 'Repeat until clear'], color: 'bg-orange-500' },
            { id: 'burns', title: 'Minor Burns', steps: ['Run cool water for 10 mins', 'Remove jewelry near area', 'Do not pop blisters', 'Apply loose bandage'], color: 'bg-yellow-500' }
        ];

        let state = {
            lang: 'en',
            activeTab: 'home', // 'home', 'map', 'triage', 'meds', 'blood', 'firstaid'
            isAdmin: false,
            location: { 
                lat: 28.6139, 
                lng: 77.2090, 
                name: "Hauz Khas, New Delhi", 
                isAuto: true 
            },
            hospitals: [
                { id: 'h1', name: "AIIMS - Trauma Center", beds: 4, wait: 12, x: 65, y: 35, specialty: "Cardiology", distance: "1.2 km", traffic: 'Low', blood: { 'O+': 12, 'AB-': 2, 'B+': 5 }, medicines: { "Aspirin": 150, "Oxygen": 40 } },
                { id: 'h2', name: "Fortis Memorial", beds: 18, wait: 8, x: 25, y: 60, specialty: "Neurology", distance: "4.5 km", traffic: 'Moderate', blood: { 'O+': 0, 'A+': 18, 'O-': 4 }, medicines: { "Mannitol": 30, "Antibiotics": 200 } },
                { id: 'h3', name: "Apollo Hospitals", beds: 0, wait: 45, x: 80, y: 75, specialty: "Orthopedics", distance: "6.8 km", traffic: 'Heavy', blood: { 'AB-': 1, 'O-': 0 }, medicines: { "Morphine": 12, "Oxygen": 5 } }
            ],
            searchQuery: '',
            loading: true,
            notification: null,
            isLocationModal: false,
            tempLocationInput: ''
        };

        // --- CORE FUNCTIONS ---
        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        function showToast(msg) {
            state.notification = msg;
            render();
            setTimeout(() => { state.notification = null; render(); }, 3000);
        }

        // --- COMPONENTS ---

        function Header() {
            return `
                <div class="bg-white/95 backdrop-blur-xl p-4 pt-safe flex justify-between items-center sticky top-0 z-[100] border-b border-slate-100">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="setState({isLocationModal: true})">
                        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                            <i data-lucide="zap" class="text-white fill-white w-5 h-5"></i>
                        </div>
                        <div class="overflow-hidden">
                            <div class="flex items-center gap-1">
                                <h1 class="text-xs font-black text-slate-400 uppercase tracking-widest">${state.location.isAuto ? 'Live Location' : 'Manual Location'}</h1>
                                <i data-lucide="chevron-down" class="w-3 h-3 text-slate-400"></i>
                            </div>
                            <p class="text-sm font-black text-slate-900 truncate max-w-[160px] leading-tight">${state.location.name}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setState({lang: state.lang === 'en' ? 'hi' : 'en'})" class="px-3 py-1.5 bg-slate-900 rounded-xl text-[10px] font-black text-white flex items-center gap-2 active:scale-90 transition-transform">
                            ${state.lang === 'en' ? 'HI' : 'EN'}
                        </button>
                    </div>
                </div>
            `;
        }

        function LocationModal() {
            if (!state.isLocationModal) return '';
            return `
                <div class="fixed inset-0 z-[1000] flex items-end justify-center bg-slate-900/60 backdrop-blur-sm px-4 pb-10" onclick="setState({isLocationModal: false})">
                    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl slide-up" onclick="event.stopPropagation()">
                        <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
                        <h2 class="text-2xl font-black text-slate-900 mb-2">Change Location</h2>
                        <p class="text-sm text-slate-400 mb-8 font-medium">Search for a location to see nearby support for others.</p>
                        
                        <div class="relative mb-6">
                            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                            <input 
                                type="text" 
                                placeholder="Enter area, city or hospital..."
                                class="w-full pl-14 pr-5 py-5 rounded-3xl bg-slate-50 text-slate-800 font-bold focus:outline-none focus:ring-4 focus:ring-blue-500/10 border-none placeholder-slate-300"
                                oninput="state.tempLocationInput = this.value"
                            />
                        </div>

                        <div class="space-y-3 mb-8">
                            <button onclick="fetchLiveLocation()" class="w-full p-5 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-between font-black text-xs uppercase tracking-widest">
                                <div class="flex items-center gap-3">
                                    <i data-lucide="navigation" class="w-5 h-5"></i>
                                    Use Live Location
                                </div>
                                <span class="bg-blue-600 text-white px-2 py-0.5 rounded text-[8px]">Auto</span>
                            </button>
                            <button onclick="setManualLocation()" class="w-full p-5 bg-slate-900 text-white rounded-3xl flex items-center justify-center font-black text-xs uppercase tracking-widest">
                                Update Location
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function HomeView() {
            return `
                <div class="p-5 space-y-6 pb-32 animate-in overflow-y-auto flex-1 hide-scrollbar">
                    <!-- Feature Grid (Matching Image) -->
                    <div class="grid grid-cols-2 gap-4">
                        <div onclick="setState({activeTab: 'triage'})" class="feature-card p-6 bg-red-50/50 border border-red-100/50 rounded-[2.5rem] flex flex-col items-start cursor-pointer">
                            <div class="w-12 h-12 bg-red-500 rounded-full flex items-center justify-center text-white mb-6 shadow-xl shadow-red-500/20">
                                <i data-lucide="activity" class="w-6 h-6"></i>
                            </div>
                            <h3 class="font-black text-slate-800 text-base mb-1">Symptom Triage</h3>
                            <p class="text-xs text-slate-400 font-medium">Symptom matching</p>
                        </div>

                        <div onclick="setState({activeTab: 'meds'})" class="feature-card p-6 bg-blue-50/50 border border-blue-100/50 rounded-[2.5rem] flex flex-col items-start cursor-pointer">
                            <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white mb-6 shadow-xl shadow-blue-500/20">
                                <i data-lucide="package" class="w-6 h-6"></i>
                            </div>
                            <h3 class="font-black text-slate-800 text-base mb-1">Medicine Finder</h3>
                            <p class="text-xs text-slate-400 font-medium">Stock availability</p>
                        </div>

                        <div onclick="setState({activeTab: 'blood'})" class="feature-card p-6 bg-orange-50/50 border border-orange-100/50 rounded-[2.5rem] flex flex-col items-start cursor-pointer">
                            <div class="w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center text-white mb-6 shadow-xl shadow-orange-500/20">
                                <i data-lucide="droplet" class="w-6 h-6"></i>
                            </div>
                            <h3 class="font-black text-slate-800 text-base mb-1">Blood Availability</h3>
                            <p class="text-xs text-slate-400 font-medium">Real-time units</p>
                        </div>

                        <div onclick="setState({activeTab: 'firstaid'})" class="feature-card p-6 bg-teal-50/50 border border-teal-100/50 rounded-[2.5rem] flex flex-col items-start cursor-pointer">
                            <div class="w-12 h-12 bg-teal-500 rounded-full flex items-center justify-center text-white mb-6 shadow-xl shadow-teal-500/20">
                                <i data-lucide="info" class="w-6 h-6"></i>
                            </div>
                            <h3 class="font-black text-slate-800 text-base mb-1">First Aid Guide</h3>
                            <p class="text-xs text-slate-400 font-medium">Emergency steps</p>
                        </div>
                    </div>

                    <!-- Ambulance Radar Banner -->
                    <div onclick="setState({activeTab: 'map'})" class="bg-blue-600 p-6 rounded-[2.5rem] text-white shadow-xl shadow-blue-500/30 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-all">
                        <div class="flex items-center gap-4">
                            <div class="relative">
                                <div class="w-14 h-14 bg-white/20 backdrop-blur-md rounded-[1.8rem] flex items-center justify-center text-white z-10 relative">
                                    <i data-lucide="truck" class="w-7 h-7"></i>
                                </div>
                                <div class="absolute inset-0 bg-white/20 rounded-[1.8rem] pulse-ring"></div>
                            </div>
                            <div>
                                <h4 class="text-sm font-black tracking-tight">Ambulance Radar</h4>
                                <p class="text-[10px] text-blue-100 font-bold uppercase mt-1">2 Units near ${state.location.name.split(',')[0]}</p>
                            </div>
                        </div>
                        <i data-lucide="arrow-right" class="w-5 h-5 text-white/50"></i>
                    </div>

                    <!-- Emergency Footer -->
                    <div class="bg-red-600 p-6 rounded-[2.5rem] text-white flex justify-between items-center shadow-xl shadow-red-500/30">
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">SOS Helplines</p>
                            <h3 class="text-2xl font-black italic tracking-tighter uppercase">Call 108</h3>
                        </div>
                        <a href="tel:108" class="w-16 h-16 bg-white rounded-[1.8rem] flex items-center justify-center text-red-600 shadow-xl active:scale-90 transition-transform">
                            <i data-lucide="phone" class="w-8 h-8 fill-current"></i>
                        </a>
                    </div>
                </div>
            `;
        }

        function BloodBankView() {
            return `
                <div class="p-5 pb-32 animate-in flex-1 overflow-y-auto hide-scrollbar">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl mb-6">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center text-white">
                                <i data-lucide="droplet" class="w-5 h-5"></i>
                            </div>
                            <h2 class="text-2xl font-black text-slate-900">Blood Bank</h2>
                        </div>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Units near ${state.location.name}</p>
                    </div>

                    <div class="space-y-4">
                        ${state.hospitals.map(h => `
                            <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                <h4 class="font-black text-slate-800 text-sm mb-4">${h.name}</h4>
                                <div class="grid grid-cols-2 gap-3">
                                    ${Object.entries(h.blood).map(([type, qty]) => `
                                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                                            <span class="text-sm font-black text-slate-800">${type}</span>
                                            <span class="text-[10px] font-black px-2 py-1 rounded-lg ${qty > 5 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} uppercase">
                                                ${qty} Units
                                            </span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function FirstAidView() {
            return `
                <div class="p-5 pb-32 animate-in flex-1 overflow-y-auto hide-scrollbar">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl mb-6">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 bg-teal-500 rounded-xl flex items-center justify-center text-white">
                                <i data-lucide="info" class="w-5 h-5"></i>
                            </div>
                            <h2 class="text-2xl font-black text-slate-900">First Aid</h2>
                        </div>
                        <p class="text-xs text-slate-400 font-bold tracking-widest uppercase">Immediate Actions Save Lives</p>
                    </div>

                    <div class="space-y-4">
                        ${FIRST_AID_GUIDES.map(guide => `
                            <div class="bg-white p-7 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                <div class="flex items-center gap-4 mb-6">
                                    <div class="w-12 h-12 ${guide.color} rounded-2xl flex items-center justify-center text-white">
                                        <i data-lucide="check-circle" class="w-6 h-6"></i>
                                    </div>
                                    <h3 class="text-lg font-black text-slate-800">${guide.title}</h3>
                                </div>
                                <div class="space-y-3">
                                    ${guide.steps.map((step, i) => `
                                        <div class="flex items-start gap-3">
                                            <span class="w-5 h-5 rounded-full bg-slate-100 flex items-center justify-center text-[10px] font-black shrink-0 mt-0.5">${i+1}</span>
                                            <p class="text-sm font-medium text-slate-600">${step}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- HANDLERS ---
        function fetchLiveLocation() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    setState({ 
                        location: { 
                            lat: pos.coords.latitude, 
                            lng: pos.coords.longitude, 
                            name: "Live: Greater Noida", // Simplified for demo
                            isAuto: true 
                        },
                        isLocationModal: false
                    });
                    showToast("Live location synced");
                });
            }
        }

        function setManualLocation() {
            if (state.tempLocationInput.length < 2) return;
            setState({ 
                location: { 
                    lat: 28.6139, 
                    lng: 77.2090, 
                    name: state.tempLocationInput, 
                    isAuto: false 
                },
                isLocationModal: false
            });
            showToast("Location updated manually");
        }

        // --- RENDERER ---
        function render() {
            const container = document.getElementById('app-container');
            
            if (state.loading) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center bg-slate-950 absolute inset-0">
                        <div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] flex items-center justify-center shadow-2xl shadow-blue-500/40 mb-10 animate-bounce">
                             <i data-lucide="zap" class="text-white w-12 h-12 fill-current"></i>
                        </div>
                        <span class="text-[11px] font-black tracking-[0.6em] text-white uppercase animate-pulse">LIFELINE INDIA</span>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            let viewContent = '';
            switch(state.activeTab) {
                case 'home': viewContent = HomeView(); break;
                case 'blood': viewContent = BloodBankView(); break;
                case 'firstaid': viewContent = FirstAidView(); break;
                case 'meds': 
                    // Reuse previous MedSearchView logic
                    viewContent = `<div class="p-10 text-center font-black opacity-20 mt-20">Medicine System Online</div>`;
                    break;
                case 'triage':
                    // Reuse previous TriageView logic
                    viewContent = `<div class="p-10 text-center font-black opacity-20 mt-20">Triage AI Active</div>`;
                    break;
                case 'map':
                    // MapView logic (already robust from last version)
                    viewContent = `<div class="p-10 text-center font-black opacity-20 mt-20">Map Radar Engaged</div>`;
                    break;
            }

            container.innerHTML = `
                ${Header()}
                <main class="flex-1 flex flex-col overflow-hidden relative">
                    ${viewContent}
                </main>
                ${LocationModal()}
                ${state.notification ? `<div class="fixed top-24 left-4 right-4 z-[300] animate-in bg-slate-900 text-white p-4 rounded-2xl font-black text-xs text-center">${state.notification}</div>` : ''}
                
                <!-- Bottom Nav -->
                <nav class="fixed bottom-0 max-w-md w-full bg-white/95 backdrop-blur-2xl border-t border-slate-100 flex justify-around items-center p-4 pb-safe z-[200]">
                    <button onclick="setState({activeTab: 'home'})" class="p-2 transition-all flex flex-col items-center gap-1 ${state.activeTab === 'home' ? 'text-blue-600' : 'text-slate-300'}">
                        <i data-lucide="home" class="w-6 h-6"></i>
                    </button>
                    <button onclick="setState({activeTab: 'map'})" class="p-2 transition-all flex flex-col items-center gap-1 ${state.activeTab === 'map' ? 'text-blue-600' : 'text-slate-300'}">
                        <i data-lucide="radar" class="w-6 h-6"></i>
                    </button>
                    <div onclick="setState({activeTab: 'home'})" class="w-14 h-14 -mt-12 bg-blue-600 rounded-3xl flex items-center justify-center text-white shadow-2xl ring-8 ring-white cursor-pointer">
                        <i data-lucide="zap" class="w-7 h-7 fill-white"></i>
                    </div>
                    <button onclick="setState({activeTab: 'blood'})" class="p-2 transition-all flex flex-col items-center gap-1 ${state.activeTab === 'blood' ? 'text-blue-600' : 'text-slate-300'}">
                        <i data-lucide="droplet" class="w-6 h-6"></i>
                    </button>
                    <button onclick="setState({activeTab: 'firstaid'})" class="p-2 transition-all flex flex-col items-center gap-1 ${state.activeTab === 'firstaid' ? 'text-blue-600' : 'text-slate-300'}">
                        <i data-lucide="info" class="w-6 h-6"></i>
                    </button>
                </nav>
            `;

            lucide.createIcons();
        }

        // --- INIT ---
        window.onload = () => {
            setTimeout(() => {
                state.loading = false;
                render();
            }, 1500);
        };
    </script>
</body>
</html>
